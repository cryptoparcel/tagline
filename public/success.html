<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#08080a" />
<meta name="color-scheme" content="dark" />
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%2308080a'/%3E%3Cpath d='M14 4 L18 4 L18 14 L28 14 L28 18 L18 18 L18 28 L14 28 L14 18 L4 18 L4 14 L14 14 Z' fill='%23d4a558'/%3E%3C/svg%3E" />
<title>Order confirmed — TAGLINE</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/styles.css" />

<style>
  .success-icon{
    width:80px;height:80px;
    border:2px solid var(--gold);
    border-radius:50%;
    display:grid;place-items:center;
    color:var(--gold);
    margin:0 auto 32px;
    animation:scaleIn .5s ease both;
  }
  @keyframes scaleIn {
    from{transform:scale(0.5);opacity:0}
    to{transform:scale(1);opacity:1}
  }
  .success-content{text-align:center}
  .success-content h1{margin-bottom:14px}
</style>
</head>
<body>
<a class="skip-link" href="#main">Skip to content</a>

<header class="nav">
  <a href="/" class="logo">TAGLINE</a>
  <div class="nav-links">
    <a href="/" class="nav-link hide-mobile">Continue shopping</a>
    <a href="/account" class="nav-link signin-link">Sign in</a>
    <a href="/cart" class="cart-icon-btn" aria-label="Cart">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M5 7h14l-1.5 12a2 2 0 0 1-2 1.8h-7a2 2 0 0 1-2-1.8L5 7z"/><path d="M9 7V5a3 3 0 0 1 6 0v2"/></svg>
      <span class="cart-badge" data-cart-count style="display:none">0</span>
    </a>
  </div>
</header>

<main class="page-narrow" id="main" tabindex="-1">
  <div class="success-content">
    <div class="success-icon">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M5 12l5 5L20 7"/>
      </svg>
    </div>
    <div class="section-marker" style="justify-content:center"><span class="label">Order confirmed</span></div>
    <h1 class="page-title">Thank you.</h1>
    <p class="page-sub">Your order is in. You'll get a confirmation email shortly with all the details. We'll send tracking info as soon as it ships.</p>

    <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:24px">
      <a href="/" class="btn btn-primary">Continue shopping</a>
      <a href="/account" class="btn btn-ghost">View order history</a>
    </div>
  </div>
</main>

<footer>
  <span>© 2026 TAGLINE</span>
  <a href="/contact">Contact</a>
</footer>

<script src="/tagline-app.js" defer></script>
<script>
  // Clear the cart now that the order is placed
  if (window.Tagline?.Cart) {
    window.Tagline.Cart.clear();
  } else {
    document.addEventListener('DOMContentLoaded', () => {
      if (window.Tagline?.Cart) window.Tagline.Cart.clear();
    });
  }
</script>

</body>
</html>
