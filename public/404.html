<style>
  .nf-stage{
    min-height:calc(100vh - 200px);
    min-height:calc(100dvh - 200px);
    display:grid;
    place-items:center;
    text-align:center;
    padding:48px 24px;
  }
  .nf-cross{
    width:80px;
    height:140px;
    margin:0 auto 32px;
    color:var(--gold);
    opacity:.6;
    filter:
      drop-shadow(0 0 12px rgba(255,235,180,.4))
      drop-shadow(0 0 32px rgba(184,137,61,.25));
    animation:nfPulse 3.5s ease-in-out infinite;
  }
  @keyframes nfPulse{
    0%,100% { opacity:.6; transform:scale(1); }
    50%     { opacity:.85; transform:scale(1.04); }
  }
  .nf-code{
    font-family:'Space Grotesk',sans-serif;
    font-size:14px;
    letter-spacing:.32em;
    color:var(--gold);
    margin-bottom:18px;
    font-weight:600;
  }
  .nf-title{
    font-family:'Space Grotesk',sans-serif;
    font-size:clamp(36px,6vw,64px);
    font-weight:600;
    letter-spacing:-0.025em;
    color:var(--ink);
    margin-bottom:16px;
    line-height:1;
  }
  .nf-sub{
    font-size:15px;
    color:var(--ink-soft);
    margin-bottom:36px;
    max-width:420px;
    margin-left:auto;
    margin-right:auto;
    line-height:1.7;
  }
</style>
</head>
<body>

  </div>
</header>

<main id="main" tabindex="-1">
  <div class="nf-stage">
    <div>
      <svg class="nf-cross" viewBox="0 0 200 340" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <defs>
          <linearGradient id="nfg" x1="50%" y1="0%" x2="50%" y2="100%">
            <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
            <stop offset="100%" stop-color="#b8893d" stop-opacity="0.7"/>

      <p class="nf-sub">The link is broken or the page never existed. Find your way back.</p>
      <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
        <a href="/" class="btn btn-primary">Back to home</a>
        <a href="/contact" class="btn btn-ghost">Get help</a>
      </div>
    </div>
  </div>
</main>
