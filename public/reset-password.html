<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#08080a" />
<meta name="color-scheme" content="dark" />
<meta name="robots" content="noindex, nofollow" />
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%2308080a'/%3E%3Cpath d='M14 4 L18 4 L18 14 L28 14 L28 18 L18 18 L18 28 L14 28 L14 18 L4 18 L4 14 L14 14 Z' fill='%23d4a558'/%3E%3C/svg%3E" />
<title>Reset password — TAGLINE</title>
<meta name="description" content="Set a new password for your TAGLINE account." />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/styles.css" />
</head>
<body>

<header class="nav">
  <a href="/" class="logo">TAGLINE</a>
  <div class="nav-links">
    <a href="/" class="nav-link hide-mobile">Home</a>
  </div>
</header>

<main class="page-narrow">
  <div style="text-align:center;margin-bottom:36px">
    <div class="section-marker" style="justify-content:center"><span class="label">Account</span></div>
    <h1 class="page-title">New password.</h1>
  </div>

  <div class="card">
    <div id="alertContainer" role="alert" aria-live="polite" aria-atomic="true"></div>

    <!-- Loading state — shown until we know whether the token is valid -->
    <div id="loadingState" style="text-align:center;color:var(--muted);padding:24px 0">
      Verifying reset link…
    </div>

    <!-- Form to set new password -->
    <form id="resetPasswordForm" style="display:none">
      <div class="form-group">
        <label class="form-label" for="newPassword">New password (8+ characters)</label>
        <input class="form-input" type="password" id="newPassword" name="password" required autocomplete="new-password" minlength="8" />
      </div>
      <div class="form-group">
        <label class="form-label" for="confirmPassword">Confirm password</label>
        <input class="form-input" type="password" id="confirmPassword" name="confirm" required autocomplete="new-password" minlength="8" />
      </div>
      <button type="submit" class="btn btn-primary btn-block">Update password</button>
    </form>

    <!-- Invalid / expired token state -->
    <div id="invalidState" style="display:none;text-align:center">
      <p style="color:var(--ink-soft);font-size:14px;margin-bottom:24px;line-height:1.6">
        This reset link is invalid or has expired. Reset links are valid for 1 hour.
      </p>
      <a href="/signin" class="btn btn-primary">Back to sign in</a>
    </div>
  </div>
</main>

<footer>
  <span>© 2026 TAGLINE</span>
  <a href="/contact">Contact</a>
</footer>

<script>
(function(){
  // Supabase puts the recovery token in the URL HASH (not the query string)
  // so it never hits the server. Format:
  //   #access_token=eyJ...&refresh_token=...&expires_in=3600&token_type=bearer&type=recovery
  function getHashParams() {
    const hash = window.location.hash.startsWith('#')
      ? window.location.hash.slice(1) : '';
    const out = {};
    for (const pair of hash.split('&')) {
      if (!pair) continue;
      const [k, v] = pair.split('=');
      out[decodeURIComponent(k)] = decodeURIComponent(v || '');
    }
    return out;
  }

  function showAlert(message, type = 'error') {
    const container = document.getElementById('alertContainer');
    container.innerHTML = '';
    const div = document.createElement('div');
    div.className = 'alert alert-' + (type === 'success' ? 'success' : 'error');
    div.textContent = message;
    container.appendChild(div);
  }

  function showInvalid() {
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('resetPasswordForm').style.display = 'none';
    document.getElementById('invalidState').style.display = 'block';
  }

  function showForm() {
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('invalidState').style.display = 'none';
    document.getElementById('resetPasswordForm').style.display = 'block';
  }

  let recoveryToken = null;
  let authConfig = null;

  async function bootstrap() {
    // 1. Load public auth config so we know which Supabase project to call
    try {
      const res = await fetch('/api/config');
      if (!res.ok) { showInvalid(); return; }
      const data = await res.json();
      if (!data.ok || !data.supabaseUrl || !data.supabaseAnonKey) {
        showInvalid();
        return;
      }
      authConfig = { supabaseUrl: data.supabaseUrl, supabaseAnonKey: data.supabaseAnonKey };
    } catch {
      showInvalid();
      return;
    }

    // 2. Pull the recovery token from URL hash
    const params = getHashParams();
    if (params.type !== 'recovery' || !params.access_token) {
      showInvalid();
      return;
    }
    // Validate it looks like a JWT before sending it anywhere
    if (!/^[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+$/.test(params.access_token)) {
      showInvalid();
      return;
    }
    recoveryToken = params.access_token;

    // 3. Strip the hash from the URL so the token doesn't hang around
    //    in browser history or screenshots
    history.replaceState(null, '', window.location.pathname);

    showForm();
  }

  document.getElementById('resetPasswordForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    if (!recoveryToken || !authConfig) {
      showAlert('Reset session is invalid. Try the link again or request a new one.');
      return;
    }
    const pw = document.getElementById('newPassword').value;
    const confirm = document.getElementById('confirmPassword').value;

    if (pw.length < 8) {
      showAlert('Password must be at least 8 characters.');
      return;
    }
    if (pw !== confirm) {
      showAlert('The two passwords do not match.');
      return;
    }
    // Block the most common weak passwords (NIST SP 800-63B § 5.1.1.2)
    const COMMON_BAD = ['password','12345678','123456789','qwerty123','password1','iloveyou','admin123','letmein1','welcome1'];
    if (COMMON_BAD.indexOf(pw.toLowerCase()) !== -1) {
      showAlert('That password is too common. Pick a stronger one.');
      return;
    }

    const btn = e.target.querySelector('button[type="submit"]');
    btn.disabled = true;
    btn.textContent = 'Updating…';

    try {
      const res = await fetch(authConfig.supabaseUrl + '/auth/v1/user', {
        method: 'PUT',
        headers: {
          'Content-Type': 'application/json',
          'apikey': authConfig.supabaseAnonKey,
          'Authorization': 'Bearer ' + recoveryToken
        },
        body: JSON.stringify({ password: pw })
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        showAlert(data.error_description || data.msg || 'Could not update password. The link may have expired.');
        btn.disabled = false;
        btn.textContent = 'Update password';
        return;
      }
      // Success — wipe the recovery token and send them to sign in
      recoveryToken = null;
      showAlert('Password updated. Redirecting to sign in…', 'success');
      setTimeout(() => { window.location.href = '/signin'; }, 1500);
    } catch (err) {
      showAlert('Network error. Please try again.');
      btn.disabled = false;
      btn.textContent = 'Update password';
    }
  });

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', bootstrap);
  } else {
    bootstrap();
  }
})();
</script>

</body>
</html>
