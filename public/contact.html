<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#08080a" />
<meta name="color-scheme" content="dark" />
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%2308080a'/%3E%3Cpath d='M14 4 L18 4 L18 14 L28 14 L28 18 L18 18 L18 28 L14 28 L14 18 L4 18 L4 14 L14 14 Z' fill='%23d4a558'/%3E%3C/svg%3E" />
<title>Contact — TAGLINE</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/styles.css" />
</head>
<body>
<a class="skip-link" href="#main">Skip to content</a>

<header class="nav">
  <a href="/" class="logo">TAGLINE</a>
  <div class="nav-links">
    <a href="/" class="nav-link hide-mobile">Home</a>
    <a href="/signin" class="nav-link signin-link">Sign in</a>
    <a href="/cart" class="cart-icon-btn" aria-label="Cart">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M5 7h14l-1.5 12a2 2 0 0 1-2 1.8h-7a2 2 0 0 1-2-1.8L5 7z"/><path d="M9 7V5a3 3 0 0 1 6 0v2"/></svg>
      <span class="cart-badge" data-cart-count style="display:none">0</span>
    </a>
  </div>
</header>

<main class="page-narrow" id="main" tabindex="-1">
  <div class="section-marker"><span class="label">Get in touch</span></div>
  <h1 class="page-title">Contact us.</h1>
  <p class="page-sub">Questions about sizing, custom orders, or your order? Send a note.</p>

  <div class="card">
    <div id="alertContainer" role="alert" aria-live="polite" aria-atomic="true"></div>
    <form id="contactForm">
      <div class="form-group">
        <label class="form-label" for="name">Name</label>
        <input class="form-input" type="text" id="name" name="name" required autocomplete="name" maxlength="100" />
      </div>
      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input class="form-input" type="email" id="email" name="email" required autocomplete="email" />
      </div>
      <div class="form-group">
        <label class="form-label" for="subject">Subject (optional)</label>
        <input class="form-input" type="text" id="subject" name="subject" maxlength="200" />
      </div>
      <div class="form-group">
        <label class="form-label" for="message">Message</label>
        <textarea class="form-textarea" id="message" name="message" rows="10" required minlength="10" maxlength="5000" placeholder="Tell us as much as you need — order details, design notes, sizes, deadlines, anything we should know."></textarea>
      </div>
      <p style="font-size:12px;color:var(--ink-soft);margin:6px 0 16px;line-height:1.5">
        Your message and email are stored so we can reply. We won't share them. See our <a href="/privacy" style="color:var(--gold-soft);text-decoration:underline">Privacy Policy</a>.
      </p>
      <button type="submit" class="btn btn-primary btn-block">Send message</button>
    </form>
  </div>
</main>

<footer>
  <span>© 2026 TAGLINE</span>
  <div style="display:flex;gap:18px;flex-wrap:wrap"><a href="/contact">Contact</a><a href="/privacy">Privacy</a><a href="/terms">Terms</a></div>
</footer>

<script src="/tagline-app.js" defer></script>
<script>
(function(){
  function showAlert(message, type = 'error') {
    const container = document.getElementById('alertContainer');
    container.innerHTML = '';
    const div = document.createElement('div');
    div.className = 'alert alert-' + (type === 'success' ? 'success' : 'error');
    div.textContent = message;
    container.appendChild(div);
  }

  // Pre-fill from URL params (?subject=Custom+build+request) and sessionStorage
  // (set by /customize page when user submits a build)
  const urlParams = new URLSearchParams(window.location.search);
  const subjectParam = urlParams.get('subject');
  if (subjectParam) {
    document.getElementById('subject').value = subjectParam.slice(0, 200);
  }
  try {
    const customRequest = sessionStorage.getItem('tagline_custom_request');
    if (customRequest) {
      document.getElementById('message').value = customRequest.slice(0, 5000);
      sessionStorage.removeItem('tagline_custom_request');
    }
  } catch {}

  document.getElementById('contactForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const data = Object.fromEntries(new FormData(e.target).entries());
    const btn = e.target.querySelector('button[type="submit"]');
    btn.disabled = true;
    btn.textContent = 'Sending…';

    const result = await window.Tagline.API.request('/api/contact', {
      method: 'POST',
      body: data
    });

    if (result.ok) {
      e.target.reset();
      showAlert(result.message || 'Thanks! We\'ll be in touch.', 'success');
      btn.disabled = false;
      btn.textContent = 'Send message';
    } else if (result.preview) {
      showAlert('Thanks for the message! Our contact form goes live at launch.', 'success');
      e.target.reset();
      btn.disabled = false;
      btn.textContent = 'Send message';
    } else {
      showAlert(result.error || 'Something went wrong. Please try again.');
      btn.disabled = false;
      btn.textContent = 'Send message';
    }
  });
})();
</script>

</body>
</html>
