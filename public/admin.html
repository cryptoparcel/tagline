<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#08080a" />
<meta name="color-scheme" content="dark" />
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%2308080a'/%3E%3Cpath d='M14 4 L18 4 L18 14 L28 14 L28 18 L18 18 L18 28 L14 28 L14 18 L4 18 L4 14 L14 14 Z' fill='%23d4a558'/%3E%3C/svg%3E" />
<title>Admin — TAGLINE</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/styles.css" />

<style>
  .admin-tabs{
    display:flex;gap:24px;
    border-bottom:1px solid var(--line);
    margin-bottom:36px;
    overflow-x:auto;
    -webkit-overflow-scrolling:touch;
  }
  .admin-tabs::-webkit-scrollbar{display:none}
  .admin-tab{
    background:transparent;
    color:var(--muted);
    font-size:13px;font-weight:500;
    padding:14px 0;
    border-bottom:2px solid transparent;
    white-space:nowrap;
    transition:color .2s,border-color .2s;
  }
  .admin-tab.active{
    color:var(--ink);
    border-bottom-color:var(--gold);
  }

  .stats-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:14px;
    margin-bottom:36px;
  }
  .stat-card{
    background:linear-gradient(160deg,#14110c 0%,#0d0c0a 100%);
    border:1px solid var(--line);
    padding:20px 24px;
  }
  .stat-label{
    font-size:11px;font-weight:600;
    letter-spacing:.18em;text-transform:uppercase;
    color:var(--gold);
    margin-bottom:8px;
  }
  .stat-value{
    font-family:'Space Grotesk',sans-serif;
    font-size:28px;font-weight:600;
    color:var(--ink);
    letter-spacing:-0.02em;
  }

  .data-table{
    width:100%;
    background:linear-gradient(160deg,#14110c 0%,#0d0c0a 100%);
    border:1px solid var(--line);
    border-collapse:collapse;
  }
  .data-table th, .data-table td{
    padding:14px 18px;
    text-align:left;
    font-size:13px;
    border-bottom:1px solid var(--line);
    vertical-align:top;
  }
  .data-table th{
    font-size:10px;font-weight:600;
    letter-spacing:.18em;text-transform:uppercase;
    color:var(--gold);
    background:rgba(0,0,0,.2);
  }
  .data-table tr:last-child td{border-bottom:none}
  .data-table td.mono{
    font-family:'Space Grotesk',sans-serif;
    color:var(--ink-soft);
  }
  .data-table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}

  .status-pill{
    display:inline-block;padding:3px 8px;
    font-size:10px;font-weight:600;
    letter-spacing:.12em;text-transform:uppercase;
    border:1px solid var(--line-strong);
  }
  .status-pill.paid{color:var(--gold-soft);border-color:rgba(184,137,61,.4)}
  .status-pill.shipped{color:#7ba8d8;border-color:rgba(123,168,216,.4)}
  .status-pill.delivered{color:#7dc88a;border-color:rgba(125,200,138,.4)}
  .status-pill.pending{color:var(--muted)}
  .status-pill.cancelled,.status-pill.refunded,.status-pill.new{color:var(--error);border-color:rgba(229,115,115,.3)}

  .auth-prompt{
    max-width:420px;margin:120px auto;
    background:linear-gradient(160deg,#14110c 0%,#0d0c0a 100%);
    border:1px solid var(--line);
    padding:40px;
    text-align:center;
  }
  .auth-prompt h2{
    font-family:'Space Grotesk',sans-serif;
    font-size:24px;font-weight:600;
    margin-bottom:12px;letter-spacing:-0.025em;
  }
  .auth-prompt p{color:var(--ink-soft);margin-bottom:24px;font-size:14px}
</style>
</head>
<body>

<header class="nav">
  <a href="/" class="logo">TAGLINE</a>
  <div class="nav-links">
    <span class="nav-link" style="color:var(--gold-soft)">Admin</span>
    <button id="logoutBtn" class="signout-btn" style="background:transparent;color:var(--muted);font-size:11px;letter-spacing:.08em;text-transform:uppercase;padding:8px 14px;border:1px solid var(--line);display:none">Lock</button>
  </div>
</header>

<main class="page-wide" id="mainContent">
  <!-- populated by JS -->
</main>

<script>
(function(){
  const KEY_STORAGE = 'tagline_admin_key';
  const main = document.getElementById('mainContent');
  const logoutBtn = document.getElementById('logoutBtn');

  function getKey(){ return localStorage.getItem(KEY_STORAGE); }
  function setKey(k){ localStorage.setItem(KEY_STORAGE, k); }
  function clearKey(){ localStorage.removeItem(KEY_STORAGE); }

  async function adminFetch(path){
    const res = await fetch(path, { headers: { 'X-Admin-Key': getKey() } });
    return res.json();
  }
  async function adminPost(path, body){
    const res = await fetch(path, {
      method:'POST',
      headers: { 'Content-Type':'application/json', 'X-Admin-Key': getKey() },
      body: JSON.stringify(body)
    });
    return res.json();
  }

  function renderAuth(error){
    main.innerHTML = `
      <div class="auth-prompt">
        <h2>Admin access</h2>
        <p>${error || 'Enter your admin key to continue.'}</p>
        <input type="password" id="keyInput" class="form-input" placeholder="Admin key" style="margin-bottom:14px" />
        <button class="btn btn-primary btn-block" id="keySubmit">Unlock</button>
      </div>
    `;
    document.getElementById('keySubmit').addEventListener('click', async () => {
      const key = document.getElementById('keyInput').value.trim();
      if (!key) return;
      setKey(key);
      // Test it
      const result = await adminFetch('/api/admin?view=stats');
      if (!result.ok) {
        clearKey();
        renderAuth(result.error || 'Invalid key.');
        return;
      }
      logoutBtn.style.display = '';
      renderDashboard();
    });
    document.getElementById('keyInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('keySubmit').click();
    });
  }

  let activeView = 'orders';

  async function renderDashboard(){
    const stats = await adminFetch('/api/admin?view=stats');
    if (!stats.ok) {
      clearKey();
      renderAuth(stats.error);
      return;
    }
    const s = stats.stats;

    main.innerHTML = `
      <div class="section-marker"><span class="label">Dashboard</span></div>
      <h1 class="page-title">Admin</h1>
      <p class="page-sub">Orders, subscribers, and messages.</p>

      <div class="stats-grid">
        <div class="stat-card"><div class="stat-label">Paid orders</div><div class="stat-value">${s.paid_orders}</div></div>
        <div class="stat-card"><div class="stat-label">Revenue</div><div class="stat-value">$${(s.revenue_cents/100).toFixed(2)}</div></div>
        <div class="stat-card"><div class="stat-label">Subscribers</div><div class="stat-value">${s.active_subscribers}</div></div>
        <div class="stat-card"><div class="stat-label">Unread messages</div><div class="stat-value">${s.unread_messages}</div></div>
      </div>

      <div class="admin-tabs">
        <button class="admin-tab ${activeView==='orders' ? 'active' : ''}" data-view="orders">Orders</button>
        <button class="admin-tab ${activeView==='subscribers' ? 'active' : ''}" data-view="subscribers">Subscribers</button>
        <button class="admin-tab ${activeView==='messages' ? 'active' : ''}" data-view="messages">Messages</button>
      </div>
      <div id="viewContent">Loading…</div>
    `;

    document.querySelectorAll('.admin-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        activeView = tab.dataset.view;
        document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        loadView();
      });
    });

    loadView();
  }

  async function loadView(){
    const target = document.getElementById('viewContent');
    target.innerHTML = '<div style="color:var(--muted);padding:24px" aria-live="polite" aria-busy="true">Loading…</div>';

    const result = await adminFetch(`/api/admin?view=${encodeURIComponent(activeView)}`);
    if (!result.ok) {
      target.innerHTML = '';
      const alert = document.createElement('div');
      alert.className = 'alert alert-error';
      alert.textContent = result.error || 'Could not load data.';
      target.appendChild(alert);
      return;
    }

    if (activeView === 'orders') {
      const rows = (result.orders || []).map(o => {
        const safeStatus = ['paid','shipped','delivered','pending','cancelled','refunded'].includes(o.status) ? o.status : 'pending';
        const itemsHtml = (o.items||[]).map(i => `${escapeHtml(i.name)} ×${escapeHtml(String(i.quantity))}`).join('<br/>');
        return `
          <tr>
            <td class="mono">#${escapeHtml(o.id.slice(0,8).toUpperCase())}</td>
            <td>${escapeHtml(new Date(o.created_at).toLocaleDateString())}</td>
            <td>${escapeHtml(o.email)}</td>
            <td><span class="status-pill ${safeStatus}">${escapeHtml(o.status)}</span></td>
            <td>$${(o.total_cents/100).toFixed(2)}</td>
            <td style="font-size:12px;color:var(--ink-soft)">${itemsHtml}</td>
          </tr>
        `;
      }).join('');
      target.innerHTML = `
        <div class="data-table-wrap">
          <table class="data-table">
            <thead><tr><th>Order</th><th>Date</th><th>Email</th><th>Status</th><th>Total</th><th>Items</th></tr></thead>
            <tbody>${rows || '<tr><td colspan="6" style="padding:32px;text-align:center;color:var(--muted)">No orders yet.</td></tr>'}</tbody>
          </table>
        </div>
      `;
    }

    if (activeView === 'subscribers') {
      const rows = (result.subscribers || []).map(s => `
        <tr>
          <td>${escapeHtml(s.email)}</td>
          <td>${escapeHtml(s.source||'')}</td>
          <td><span class="status-pill ${s.active?'paid':'cancelled'}">${s.active?'Active':'Unsubscribed'}</span></td>
          <td>${escapeHtml(new Date(s.created_at).toLocaleDateString())}</td>
        </tr>
      `).join('');
      target.innerHTML = `
        <div class="data-table-wrap">
          <table class="data-table">
            <thead><tr><th>Email</th><th>Source</th><th>Status</th><th>Joined</th></tr></thead>
            <tbody>${rows || '<tr><td colspan="4" style="padding:32px;text-align:center;color:var(--muted)">No subscribers yet.</td></tr>'}</tbody>
          </table>
        </div>
      `;
    }

    if (activeView === 'messages') {
      const rows = (result.messages || []).map(m => {
        const safeStatus = ['new','read','replied','archived'].includes(m.status) ? m.status : 'new';
        const truncated = m.message.length > 300 ? m.message.slice(0,300) + '…' : m.message;
        return `
          <tr>
            <td>${escapeHtml(new Date(m.created_at).toLocaleDateString())}</td>
            <td>${escapeHtml(m.name)}</td>
            <td>${escapeHtml(m.email)}</td>
            <td>${escapeHtml(m.subject||'')}</td>
            <td style="max-width:300px;font-size:12px;color:var(--ink-soft);white-space:pre-wrap">${escapeHtml(truncated)}</td>
            <td><span class="status-pill ${safeStatus}">${escapeHtml(m.status)}</span></td>
          </tr>
        `;
      }).join('');
      target.innerHTML = `
        <div class="data-table-wrap">
          <table class="data-table">
            <thead><tr><th>Date</th><th>Name</th><th>Email</th><th>Subject</th><th>Message</th><th>Status</th></tr></thead>
            <tbody>${rows || '<tr><td colspan="6" style="padding:32px;text-align:center;color:var(--muted)">No messages yet.</td></tr>'}</tbody>
          </table>
        </div>
      `;
    }
  }

  function escapeHtml(s){
    return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  logoutBtn.addEventListener('click', () => {
    clearKey();
    logoutBtn.style.display = 'none';
    renderAuth();
  });

  // Boot — check preview mode first
  async function boot() {
    // Quick check: hit /api/products to see if backend exists
    try {
      const test = await fetch('/api/admin?view=stats', { headers: { 'X-Admin-Key': 'preview-mode-check' } });
      if (test.status === 404) {
        showPreviewMode();
        return;
      }
    } catch {
      showPreviewMode();
      return;
    }

    if (getKey()) {
      logoutBtn.style.display = '';
      renderDashboard();
    } else {
      renderAuth();
    }
  }

  function showPreviewMode() {
    main.innerHTML = `
      <div class="auth-prompt">
        <div style="width:42px;height:42px;margin:0 auto 24px;color:var(--gold);opacity:.7">
          <svg viewBox="0 0 200 340" fill="currentColor"><path d="M88 0 L112 0 L112 100 L180 100 L180 128 L112 128 L112 340 L88 340 L88 128 L20 128 L20 100 L88 100 Z"/></svg>
        </div>
        <h2>Admin coming soon.</h2>
        <p>The admin dashboard activates once the backend is connected. For now, this is preview mode.</p>
        <a href="/" class="btn btn-primary btn-block" style="margin-top:8px">Back to site</a>
      </div>
    `;
  }

  boot();
})();
</script>

</body>
</html>
