<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#08080a" />
<meta name="color-scheme" content="dark" />
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%2308080a'/%3E%3Cpath d='M14 4 L18 4 L18 14 L28 14 L28 18 L18 18 L18 28 L14 28 L14 18 L4 18 L4 14 L14 14 Z' fill='%23d4a558'/%3E%3C/svg%3E" />
<title>Account — TAGLINE</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/styles.css" />

<style>
  .order-row{
    background:linear-gradient(160deg,#14110c 0%,#0d0c0a 100%);
    border:1px solid var(--line);
    padding:24px;
    margin-bottom:14px;
  }
  .order-head{
    display:flex;justify-content:space-between;align-items:flex-start;
    flex-wrap:wrap;gap:12px;
    padding-bottom:14px;
    border-bottom:1px solid var(--line);
    margin-bottom:14px;
  }
  .order-id{
    font-family:'Space Grotesk',sans-serif;
    font-size:13px;
    letter-spacing:.08em;
    color:var(--ink-soft);
  }
  .order-date{
    font-size:12px;color:var(--muted);margin-top:4px;
  }
  .order-total{
    font-size:17px;font-weight:600;color:var(--ink);
  }
  .order-status{
    display:inline-block;
    padding:4px 10px;
    font-size:10px;font-weight:600;
    letter-spacing:.12em;text-transform:uppercase;
    border:1px solid var(--line-strong);
    margin-top:6px;
  }
  .order-status.paid{color:var(--gold-soft);border-color:rgba(184,137,61,.4)}
  .order-status.shipped{color:#7ba8d8;border-color:rgba(123,168,216,.4)}
  .order-status.delivered{color:#7dc88a;border-color:rgba(125,200,138,.4)}
  .order-status.cancelled, .order-status.refunded{color:var(--error);border-color:rgba(229,115,115,.3)}
  .order-items{
    font-size:13px;color:var(--ink-soft);line-height:1.7;
  }
  .order-tracking{
    margin-top:12px;padding-top:12px;border-top:1px solid var(--line);
    font-size:13px;color:var(--ink-soft);
  }
  .order-tracking strong{color:var(--ink);font-weight:500}

  /* ============ ORDER TIMELINE ============
     Visual progress track: Ordered → Paid → Shipped → Delivered.
     Reached steps are gold; future steps are muted grey. */
  .order-timeline{
    display:flex;
    align-items:flex-start;
    gap:0;
    margin:18px 0 4px;
    padding:14px 0 0;
    border-top:1px solid var(--line);
  }
  .timeline-step{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    position:relative;
    min-width:0;
  }
  .timeline-step .dot{
    width:14px;height:14px;
    border-radius:50%;
    background:var(--surface);
    border:2px solid var(--line-strong);
    z-index:2;
    transition:all .3s;
  }
  .timeline-step.done .dot{
    background:var(--gold);
    border-color:var(--gold);
    box-shadow:0 0 0 4px rgba(184,137,61,.15);
  }
  .timeline-step.current .dot{
    background:var(--gold-soft);
    border-color:var(--gold-soft);
    animation:timelinePulse 2s ease-in-out infinite;
  }
  @keyframes timelinePulse{
    0%,100% { box-shadow:0 0 0 4px rgba(212,165,88,.25); }
    50%     { box-shadow:0 0 0 8px rgba(212,165,88,.10); }
  }
  .timeline-step .lbl{
    font-size:10px;
    letter-spacing:.12em;
    text-transform:uppercase;
    color:var(--muted);
    margin-top:8px;
    text-align:center;
    white-space:nowrap;
  }
  .timeline-step.done .lbl,
  .timeline-step.current .lbl{
    color:var(--ink-soft);
  }
  .timeline-step.current .lbl{
    color:var(--gold-soft);
    font-weight:600;
  }
  /* Connecting lines between steps — drawn via :not(:last-child) */
  .timeline-step:not(:last-child)::after{
    content:'';
    position:absolute;
    top:6px;
    left:calc(50% + 7px);
    right:calc(-50% + 7px);
    height:2px;
    background:var(--line-strong);
    z-index:1;
  }
  .timeline-step.done:not(:last-child)::after{
    background:var(--gold);
  }
  /* Cancelled / refunded — don't show the timeline; just the pill */
  @media (max-width:480px){
    .timeline-step .lbl{font-size:9px;letter-spacing:.06em}
  }
  .signout-btn{
    background:transparent;
    color:var(--muted);
    font-size:12px;letter-spacing:.08em;text-transform:uppercase;
    padding:10px 16px;
    border:1px solid var(--line);
    transition:color .2s,border-color .2s;
  }
  .signout-btn:hover{color:var(--error);border-color:rgba(229,115,115,.3)}

  /* ============ LOADING SKELETON ============ */
  /* Shows pulsing placeholders while orders fetch.
   * Prevents blank page during async data load. */
  .orders-loading{ display:flex; flex-direction:column; gap:14px; }
  .skeleton-card{
    background:linear-gradient(160deg, #14110c 0%, #0d0c0a 100%);
    border:1px solid var(--line);
    height:120px;
    position:relative;
    overflow:hidden;
  }
  .skeleton-card::after{
    content:'';
    position:absolute;
    inset:0;
    background:linear-gradient(90deg, transparent, rgba(255,255,250,.04), transparent);
    animation:skeletonShimmer 1.6s ease-in-out infinite;
  }
  @keyframes skeletonShimmer{
    0%{ transform:translateX(-100%); }
    100%{ transform:translateX(100%); }
  }
  /* Visually hidden but readable to screen readers */
  .visually-hidden{
    position:absolute; width:1px; height:1px;
    padding:0; margin:-1px; overflow:hidden;
    clip:rect(0,0,0,0); white-space:nowrap; border:0;
  }

  /* ============ SETTINGS / TABS ============ */
  .acct-tabs{
    display:flex;gap:24px;
    border-bottom:1px solid var(--line);
    margin-bottom:32px;
    overflow-x:auto;
    -webkit-overflow-scrolling:touch;
  }
  .acct-tabs::-webkit-scrollbar{display:none}
  .acct-tab{
    background:transparent;
    color:var(--muted);
    font-size:13px;font-weight:500;
    padding:14px 0;
    border-bottom:2px solid transparent;
    white-space:nowrap;
    transition:color .2s,border-color .2s;
  }
  .acct-tab.active{
    color:var(--ink);
    border-bottom-color:var(--gold);
  }
  .acct-pane{display:none}
  .acct-pane.active{display:block}

  .settings-card{
    background:linear-gradient(160deg,#14110c 0%,#0d0c0a 100%);
    border:1px solid var(--line);
    padding:28px;
    margin-bottom:14px;
  }
  .settings-card h3{
    font-family:'Space Grotesk',sans-serif;
    font-size:16px;font-weight:600;
    letter-spacing:-0.01em;
    color:var(--ink);
    margin-bottom:18px;
  }
  .grid-2{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
  }
  @media (max-width:520px){
    .grid-2{grid-template-columns:1fr}
  }
</style>
</head>
<body>
<a class="skip-link" href="#main">Skip to content</a>

<header class="nav">
  <a href="/" class="logo">TAGLINE</a>
  <div class="nav-links">
    <a href="/" class="nav-link hide-mobile">Continue shopping</a>
    <a href="/cart" class="cart-icon-btn" aria-label="Cart">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M5 7h14l-1.5 12a2 2 0 0 1-2 1.8h-7a2 2 0 0 1-2-1.8L5 7z"/><path d="M9 7V5a3 3 0 0 1 6 0v2"/></svg>
      <span class="cart-badge" data-cart-count style="display:none">0</span>
    </a>
  </div>
</header>

<main class="page" id="main" tabindex="-1">
  <div class="section-marker"><span class="label">Your account</span></div>
  <h1 class="page-title">Hello.</h1>
  <p class="page-sub">Signed in as <span data-user-email style="color:var(--ink)">…</span></p>

  <div style="display:flex;gap:8px;margin-bottom:32px;flex-wrap:wrap">
    <button class="signout-btn" id="signoutBtn">Sign out</button>
  </div>

  <div class="acct-tabs" role="tablist">
    <button class="acct-tab active" role="tab" aria-selected="true" data-tab="orders">Orders</button>
    <button class="acct-tab" role="tab" aria-selected="false" data-tab="settings">Settings</button>
  </div>

  <section class="acct-pane active" id="pane-orders" role="tabpanel" aria-labelledby="tab-orders">
    <h2 style="font-family:'Space Grotesk',sans-serif;font-size:24px;font-weight:600;letter-spacing:-0.025em;margin-bottom:24px">Order history</h2>
    <div id="ordersContainer">
      <div class="empty">
        <p>Loading your orders…</p>
      </div>
    </div>
  </section>

  <section class="acct-pane" id="pane-settings" role="tabpanel" aria-labelledby="tab-settings" hidden>
    <h2 style="font-family:'Space Grotesk',sans-serif;font-size:24px;font-weight:600;letter-spacing:-0.025em;margin-bottom:24px">Settings</h2>

    <div id="settingsAlert" role="status" aria-live="polite" aria-atomic="true"></div>

    <form id="profileForm" autocomplete="on" novalidate>
      <div class="settings-card">
        <h3>Profile</h3>
        <div class="form-group">
          <label class="form-label" for="pf-name">Full name</label>
          <input class="form-input" type="text" id="pf-name" name="full_name" autocomplete="name" maxlength="80" />
        </div>
        <div class="form-group">
          <label class="form-label" for="pf-email">Email</label>
          <input class="form-input" type="email" id="pf-email" name="email" autocomplete="email" disabled style="opacity:.6;cursor:not-allowed" />
          <div style="font-size:12px;color:var(--muted);margin-top:6px">Email is tied to sign-in. Contact us to change it.</div>
        </div>
        <div class="form-group">
          <label class="form-label" for="pf-phone">Phone</label>
          <input class="form-input" type="tel" id="pf-phone" name="phone" autocomplete="tel" placeholder="+1 555 123 4567" maxlength="20" />
        </div>
      </div>

      <div class="settings-card">
        <h3>Default shipping address</h3>
        <div class="form-group">
          <label class="form-label" for="pf-line1">Address line 1</label>
          <input class="form-input" type="text" id="pf-line1" name="line1" autocomplete="address-line1" maxlength="100" />
        </div>
        <div class="form-group">
          <label class="form-label" for="pf-line2">Address line 2 (optional)</label>
          <input class="form-input" type="text" id="pf-line2" name="line2" autocomplete="address-line2" maxlength="100" />
        </div>
        <div class="grid-2">
          <div class="form-group">
            <label class="form-label" for="pf-city">City</label>
            <input class="form-input" type="text" id="pf-city" name="city" autocomplete="address-level2" maxlength="80" />
          </div>
          <div class="form-group">
            <label class="form-label" for="pf-state">State (2-letter)</label>
            <input class="form-input" type="text" id="pf-state" name="state" autocomplete="address-level1" maxlength="2" style="text-transform:uppercase" />
          </div>
        </div>
        <div class="grid-2">
          <div class="form-group">
            <label class="form-label" for="pf-zip">Postal code</label>
            <input class="form-input" type="text" id="pf-zip" name="zip" autocomplete="postal-code" maxlength="12" />
          </div>
          <div class="form-group">
            <label class="form-label" for="pf-country">Country</label>
            <select class="form-input" id="pf-country" name="country" autocomplete="country">
              <option value="US">United States</option>
              <option value="CA">Canada</option>
            </select>
          </div>
        </div>
      </div>

      <button type="submit" class="btn btn-primary" id="saveSettingsBtn">Save changes</button>
    </form>
  </section>
</main>

<footer>
  <span>© 2026 TAGLINE</span>
  <div style="display:flex;gap:18px;flex-wrap:wrap"><a href="/contact">Contact</a><a href="/privacy">Privacy</a><a href="/terms">Terms</a></div>
</footer>

<script src="/tagline-app.js" defer></script>
<script>
(function(){
  function statusClass(s){
    return ['paid','shipped','delivered','cancelled','refunded'].includes(s) ? s : '';
  }

  async function loadOrders() {
    const container = document.getElementById('ordersContainer');
    // Show loading skeleton immediately so users see something
    // (instead of a blank page while the request is in flight)
    container.innerHTML = `
      <div class="orders-loading" aria-live="polite" aria-busy="true">
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
        <span class="visually-hidden">Loading your orders…</span>
      </div>
    `;

    const result = await window.Tagline.API.request('/api/my-orders', { auth:true });
    const esc = window.Tagline.escapeHtml;

    if (!result.ok) {
      container.innerHTML = '';
      const alert = document.createElement('div');
      alert.className = 'alert alert-error';
      alert.setAttribute('role', 'alert');
      alert.textContent = result.error || 'Could not load orders.';
      container.appendChild(alert);
      return;
    }
    const orders = result.orders || [];
    if (orders.length === 0) {
      container.innerHTML = `
        <div class="empty">
          <h2>No orders yet.</h2>
          <p>When you place an order, it'll show up here.</p>
          <a href="/" class="btn btn-primary">Browse the collection</a>
        </div>
      `;
      return;
    }

    container.innerHTML = orders.map(o => {
      const date = new Date(o.created_at).toLocaleDateString('en-US', {
        year:'numeric', month:'short', day:'numeric'
      });
      const itemsList = (o.items || []).map(i =>
        `${esc(i.name)}${i.color ? ' · ' + esc(i.color) : ''} × ${esc(i.quantity)}`
      ).join('<br/>');
      const safeId = esc(o.id.slice(0,8).toUpperCase());
      const safeStatus = esc(o.status);
      const statusClassName = statusClass(o.status); // already validated against allow-list
      return `
        <div class="order-row">
          <div class="order-head">
            <div>
              <div class="order-id">Order #${safeId}</div>
              <div class="order-date">${esc(date)}</div>
              <div class="order-status ${statusClassName}">${safeStatus}</div>
            </div>
            <div style="text-align:right">
              <div class="order-total">$${(o.total_cents/100).toFixed(2)}</div>
            </div>
          </div>
          ${renderTimeline(o.status)}
          <div class="order-items">${itemsList}</div>
          ${o.tracking_number ? `<div class="order-tracking"><strong>Tracking:</strong> ${esc(o.tracking_number)}</div>` : ''}
        </div>
      `;
    }).join('');
  }

  // Build the visual timeline (Ordered → Paid → Shipped → Delivered).
  // Cancelled / refunded orders skip the timeline (the status pill alone
  // tells that story; a half-filled progress bar would be misleading).
  function renderTimeline(status) {
    if (status === 'cancelled' || status === 'refunded') return '';
    const steps = ['pending', 'paid', 'shipped', 'delivered'];
    const labels = { pending: 'Ordered', paid: 'Paid', shipped: 'Shipped', delivered: 'Delivered' };
    const currentIdx = steps.indexOf(status);
    return `
      <div class="order-timeline" aria-label="Order status">
        ${steps.map((s, i) => {
          const cls = i < currentIdx ? 'done'
                    : i === currentIdx ? 'done current'
                    : '';
          return `<div class="timeline-step ${cls}"><div class="dot"></div><div class="lbl">${labels[s]}</div></div>`;
        }).join('')}
      </div>
    `;
  }

  function init(){
    // Check preview mode first
    if (window.Tagline?.isPreviewMode && window.Tagline.isPreviewMode()) {
      showPreview();
      return;
    }
    // Try to check
    if (window.Tagline?.checkPreviewMode) {
      window.Tagline.checkPreviewMode().then(preview => {
        if (preview) {
          showPreview();
          return;
        }
        if (!window.Tagline.Auth.isLoggedIn()) {
          window.location.href = '/signin';
          return;
        }
        loadOrders();
      });
    } else {
      // Fallback if tagline-app.js hasn't loaded yet
      if (!window.Tagline?.Auth?.isLoggedIn()) {
        window.location.href = '/signin';
        return;
      }
      loadOrders();
    }
  }

  function showPreview() {
    document.querySelector('main').innerHTML = `
      <div class="page" style="text-align:center;padding-top:80px">
        <div style="width:48px;height:48px;margin:0 auto 24px;color:var(--gold);opacity:.7">
          <svg viewBox="0 0 200 340" fill="currentColor"><path d="M88 0 L112 0 L112 100 L180 100 L180 128 L112 128 L112 340 L88 340 L88 128 L20 128 L20 100 L88 100 Z"/></svg>
        </div>
        <h1 class="page-title">Account coming soon.</h1>
        <p class="page-sub">Order history activates at launch. Browse the collection in the meantime.</p>
        <a href="/" class="btn btn-primary">Browse the collection</a>
      </div>
    `;
  }

  document.getElementById('signoutBtn').addEventListener('click', async () => {
    const ok = await window.Tagline.Modal.confirm({
      title: 'Sign out?',
      message: 'You’ll need to sign back in to see your orders and saved settings.',
      confirmLabel: 'Sign out',
      cancelLabel: 'Stay'
    });
    if (ok) {
      window.Tagline.Auth.clear();
      window.location.href = '/';
    }
  });

  // ============ TABS ============
  document.querySelectorAll('.acct-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      const target = tab.dataset.tab;
      document.querySelectorAll('.acct-tab').forEach(t => {
        t.classList.toggle('active', t === tab);
        t.setAttribute('aria-selected', t === tab ? 'true' : 'false');
      });
      document.querySelectorAll('.acct-pane').forEach(p => {
        const isMatch = p.id === 'pane-' + target;
        p.classList.toggle('active', isMatch);
        if (isMatch) p.removeAttribute('hidden');
        else p.setAttribute('hidden', '');
      });
      if (target === 'settings' && !window.__profileLoaded) {
        loadProfile();
      }
    });
  });

  // ============ SETTINGS / PROFILE ============
  function settingsAlert(message, type = 'success') {
    const el = document.getElementById('settingsAlert');
    el.innerHTML = '';
    if (!message) return;
    const div = document.createElement('div');
    div.className = 'alert alert-' + (type === 'error' ? 'error' : 'success');
    div.textContent = message;
    div.style.marginBottom = '14px';
    el.appendChild(div);
  }

  function fillProfileForm(p) {
    if (!p) return;
    document.getElementById('pf-name').value = p.full_name || '';
    document.getElementById('pf-email').value = p.email || '';
    document.getElementById('pf-phone').value = p.phone || '';
    const a = p.shipping_address || {};
    document.getElementById('pf-line1').value = a.line1 || '';
    document.getElementById('pf-line2').value = a.line2 || '';
    document.getElementById('pf-city').value = a.city || '';
    document.getElementById('pf-state').value = a.state || '';
    document.getElementById('pf-zip').value = a.zip || '';
    document.getElementById('pf-country').value = a.country || 'US';
  }

  async function loadProfile() {
    const result = await window.Tagline.API.request('/api/profile', { auth: true });
    if (!result.ok) {
      settingsAlert(result.error || 'Could not load profile.', 'error');
      return;
    }
    fillProfileForm(result.profile);
    window.__profileLoaded = true;
  }

  document.getElementById('profileForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('saveSettingsBtn');
    btn.disabled = true;
    btn.textContent = 'Saving…';
    settingsAlert('');

    const v = (id) => document.getElementById(id).value.trim();
    const line1 = v('pf-line1');
    const city = v('pf-city');
    const state = v('pf-state').toUpperCase();
    const zip = v('pf-zip');
    const country = v('pf-country');

    // Only send shipping_address if at least line1+city+state+zip provided
    const hasAddress = line1 && city && state && zip;
    const body = {
      full_name: v('pf-name'),
      phone: v('pf-phone')
    };
    if (hasAddress) {
      body.shipping_address = {
        line1, city, state, zip, country,
        ...(v('pf-line2') ? { line2: v('pf-line2') } : {})
      };
    }

    const result = await window.Tagline.API.request('/api/profile', {
      method: 'PATCH', body, auth: true
    });

    if (!result.ok) {
      settingsAlert(result.error || 'Could not save changes.', 'error');
    } else {
      settingsAlert('Saved.');
      fillProfileForm(result.profile);
    }
    btn.disabled = false;
    btn.textContent = 'Save changes';
  });

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>

</body>
</html>
