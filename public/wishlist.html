<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#08080a" />
<meta name="color-scheme" content="dark" />
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%2308080a'/%3E%3Cpath d='M14 4 L18 4 L18 14 L28 14 L28 18 L18 18 L18 28 L14 28 L14 18 L4 18 L4 14 L14 14 Z' fill='%23d4a558'/%3E%3C/svg%3E" />
<title>Wishlist — TAGLINE</title>
<meta name="description" content="Your saved items at TAGLINE." />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/styles.css" />

<style>
  /* Wishlist grid - same style as homepage product grid */
  .wish-grid{
    display:grid;
    grid-template-columns:repeat(4, 1fr);
    gap:18px;
    margin-top:32px;
  }
  @media (max-width:980px){ .wish-grid{ grid-template-columns:repeat(3, 1fr); gap:14px; } }
  @media (max-width:700px){ .wish-grid{ grid-template-columns:repeat(2, 1fr); gap:8px; } }
  @media (max-width:400px){ .wish-grid{ grid-template-columns:1fr; gap:14px; } }

  .wish-card{
    background:linear-gradient(160deg, #14110c 0%, #0d0c0a 100%);
    border:1px solid var(--line);
    cursor:pointer;
    transition:border-color .25s, transform .25s;
    position:relative;
    overflow:hidden;
  }
  .wish-card:hover{ border-color:var(--line-strong); }
  .wish-image{
    aspect-ratio:1/1.1;
    display:grid; place-items:center;
    border-bottom:1px solid var(--line);
    background:linear-gradient(160deg, #1a1814 0%, #0d0c0a 100%);
  }
  .wish-letter{
    font-family:'Space Grotesk', sans-serif;
    font-size:64px;
    font-weight:600;
    color:rgba(255,255,250,.06);
    letter-spacing:-0.04em;
  }
  .wish-info{ padding:14px 16px 16px; }
  .wish-name{
    font-size:13px;
    font-weight:500;
    color:var(--ink);
    margin-bottom:3px;
    font-family:'Space Grotesk', sans-serif;
  }
  .wish-color{
    font-size:11px;
    color:var(--muted);
    margin-bottom:8px;
  }
  .wish-price{
    font-size:14px;
    font-weight:600;
    color:var(--gold-soft);
  }

  .wish-remove{
    position:absolute;
    top:12px; right:12px;
    width:36px; height:36px;
    border-radius:50%;
    background:rgba(232,80,91,.12);
    border:1px solid rgba(232,80,91,.4);
    color:#e8505b;
    display:grid; place-items:center;
    cursor:pointer;
    z-index:5;
    transition:all .2s ease;
  }
  .wish-remove:hover{
    background:rgba(232,80,91,.25);
  }
  .wish-remove svg{ width:18px; height:18px; fill:currentColor; }

  .empty-state{
    text-align:center;
    padding:64px 24px;
    border:1px solid var(--line);
    background:linear-gradient(160deg, #14110c 0%, #0d0c0a 100%);
  }
  .empty-state svg{
    width:48px; height:48px;
    margin:0 auto 24px;
    color:var(--ink-soft);
    opacity:.4;
    display:block;
  }
  .empty-state h2{
    font-family:'Space Grotesk', sans-serif;
    font-size:24px;
    font-weight:600;
    letter-spacing:-0.02em;
    color:var(--ink);
    margin-bottom:10px;
  }
  .empty-state p{
    color:var(--ink-soft);
    font-size:14px;
    margin-bottom:24px;
    line-height:1.6;
  }
</style>
</head>
<body>

<header class="nav">
  <a href="/" class="logo">TAGLINE</a>
  <div class="nav-links">
    <a href="/" class="nav-link hide-mobile">Continue shopping</a>
    <a href="/contact" class="nav-link">Contact</a>
    <a href="/signin" class="nav-link signin-link">Sign in</a>
    <a href="/cart" class="cart-icon-btn" aria-label="Cart">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M5 7h14l-1.5 12a2 2 0 0 1-2 1.8h-7a2 2 0 0 1-2-1.8L5 7z"/><path d="M9 7V5a3 3 0 0 1 6 0v2"/></svg>
      <span class="cart-badge" data-cart-count style="display:none">0</span>
    </a>
  </div>
</header>

<main class="page">
  <div class="section-marker"><span class="label">Saved</span></div>
  <h1 class="page-title">Your wishlist.</h1>
  <p class="page-sub" id="wishSub">Pieces you've saved for later.</p>

  <div id="wishContent"></div>
</main>

<footer>
  <span>© 2026 TAGLINE</span>
  <a href="/contact">Contact</a>
</footer>

<script src="/tagline-app.js" defer></script>
<script>
(function(){
  // Use the same product data structure as cart.html
  const PRODUCT_DATA = {
    'ascend-hoodie':  { name:'Ascend Hoodie',   color:'Cream',         price:148, initial:'A' },
    'halo-zip':       { name:'Halo Zip',        color:'Bone',          price:165, initial:'H' },
    'origin-tee':     { name:'Origin Tee',      color:'Ivory',         price:58,  initial:'O' },
    'sigil-tank':     { name:'Sigil Tank',      color:'White',         price:78,  initial:'S' },
    'vesper-long':    { name:'Vesper Long',     color:'Pearl',         price:92,  initial:'V' },
    'path-jogger':    { name:'Path Jogger',     color:'Bone',          price:118, initial:'P' },
    'trial-short':    { name:'Trial Short',     color:'Ivory',         price:72,  initial:'T' },
    'cloud-crew':     { name:'Cloud Crew',      color:'Fog',           price:128, initial:'C' },
    'crown-cap':      { name:'Crown Cap',       color:'White',         price:48,  initial:'C' },
    'halo-runner':    { name:'Halo Runner',     color:'Triple White',  price:215, initial:'H' },
    'aether-bra':     { name:'Aether Bra',      color:'Pearl',         price:68,  initial:'A' },
    'aether-legging': { name:'Aether Legging',  color:'White',         price:98,  initial:'A' },
    'reign-bomber':   { name:'Reign Bomber',    color:'Bone',          price:245, initial:'R' },
    'velocity-track': { name:'Velocity Track',  color:'Ivory',         price:185, initial:'V' },
    'vow-beanie':     { name:'Vow Beanie',      color:'Cream',         price:42,  initial:'V' },
    'anthem-polo':    { name:'Anthem Polo',     color:'White',         price:88,  initial:'A' },
    'lumen-crop':     { name:'Lumen Crop',      color:'Pearl',         price:54,  initial:'L' },
    'pilgrim-pant':   { name:'Pilgrim Pant',    color:'Ivory',         price:128, initial:'P' },
    'spirit-shell':   { name:'Spirit Shell',    color:'White',         price:198, initial:'S' },
    'echo-vest':      { name:'Echo Vest',       color:'Bone',          price:155, initial:'E' },
    'verse-henley':   { name:'Verse Henley',    color:'Cream',         price:84,  initial:'V' },
    'sole-sock':      { name:'Sole Sock',       color:'White Pair',    price:24,  initial:'S' },
    'pulse-band':     { name:'Pulse Band',      color:'White',         price:22,  initial:'P' },
    'quill-tote':     { name:'Quill Tote',      color:'Canvas White',  price:38,  initial:'Q' }
  };

  function init(){
    if (!window.Tagline?.Wishlist) {
      // tagline-app.js not loaded yet, retry once
      setTimeout(init, 50);
      return;
    }
    render();
  }

  function render(){
    const items = window.Tagline.Wishlist.get();
    const container = document.getElementById('wishContent');
    const sub = document.getElementById('wishSub');
    const esc = window.Tagline.escapeHtml;

    if (items.length === 0) {
      sub.textContent = '';
      container.innerHTML = `
        <div class="empty-state">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
          </svg>
          <h2>No saved items yet.</h2>
          <p>Tap the heart on any product to save it for later.</p>
          <a href="/" class="btn btn-primary">Shop the collection</a>
        </div>
      `;
      return;
    }

    sub.textContent = `${items.length} item${items.length === 1 ? '' : 's'} saved.`;

    container.innerHTML = '<div class="wish-grid"></div>';
    const grid = container.querySelector('.wish-grid');
    grid.innerHTML = items.map(id => {
      const p = PRODUCT_DATA[id];
      if (!p) return '';
      return `
        <div class="wish-card" data-id="${esc(id)}">
          <button type="button" class="wish-remove" aria-label="Remove from wishlist" data-action="remove">
            <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
            </svg>
          </button>
          <div class="wish-image"><div class="wish-letter">${esc(p.initial)}</div></div>
          <div class="wish-info">
            <div class="wish-name">${esc(p.name)}</div>
            <div class="wish-color">${esc(p.color)}</div>
            <div class="wish-price">$${p.price}</div>
          </div>
        </div>
      `;
    }).join('');
  }

  // Click handler for remove buttons and card clicks
  document.addEventListener('click', (e) => {
    const removeBtn = e.target.closest('.wish-remove');
    if (removeBtn) {
      e.preventDefault();
      e.stopPropagation();
      const card = removeBtn.closest('.wish-card');
      const id = card?.dataset.id;
      if (id) {
        window.Tagline.Wishlist.toggle(id);
        render();
      }
      return;
    }
    // Clicking on a card itself goes back to homepage to view (since no detail pages yet)
    const card = e.target.closest('.wish-card');
    if (card) {
      window.location.href = '/#shop';
    }
  });

  init();
})();
</script>

</body>
</html>
