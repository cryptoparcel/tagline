<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#08080a" />
<meta name="color-scheme" content="dark" />
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%2308080a'/%3E%3Cpath d='M14 4 L18 4 L18 14 L28 14 L28 18 L18 18 L18 28 L14 28 L14 18 L4 18 L4 14 L14 14 Z' fill='%23d4a558'/%3E%3C/svg%3E" />
<title>Account — TAGLINE</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/styles.css" />

<style>
  .order-row{
    background:linear-gradient(160deg,#14110c 0%,#0d0c0a 100%);
    border:1px solid var(--line);
    padding:24px;
    margin-bottom:14px;
  }
  .order-head{
    display:flex;justify-content:space-between;align-items:flex-start;
    flex-wrap:wrap;gap:12px;
    padding-bottom:14px;
    border-bottom:1px solid var(--line);
    margin-bottom:14px;
  }
  .order-id{
    font-family:'Space Grotesk',sans-serif;
    font-size:13px;
    letter-spacing:.08em;
    color:var(--ink-soft);
  }
  .order-date{
    font-size:12px;color:var(--muted);margin-top:4px;
  }
  .order-total{
    font-size:17px;font-weight:600;color:var(--ink);
  }
  .order-status{
    display:inline-block;
    padding:4px 10px;
    font-size:10px;font-weight:600;
    letter-spacing:.12em;text-transform:uppercase;
    border:1px solid var(--line-strong);
    margin-top:6px;
  }
  .order-status.paid{color:var(--gold-soft);border-color:rgba(184,137,61,.4)}
  .order-status.shipped{color:#7ba8d8;border-color:rgba(123,168,216,.4)}
  .order-status.delivered{color:#7dc88a;border-color:rgba(125,200,138,.4)}
  .order-status.cancelled, .order-status.refunded{color:var(--error);border-color:rgba(229,115,115,.3)}
  .order-items{
    font-size:13px;color:var(--ink-soft);line-height:1.7;
  }
  .order-tracking{
    margin-top:12px;padding-top:12px;border-top:1px solid var(--line);
    font-size:13px;color:var(--ink-soft);
  }
  .order-tracking strong{color:var(--ink);font-weight:500}
  .signout-btn{
    background:transparent;
    color:var(--muted);
    font-size:12px;letter-spacing:.08em;text-transform:uppercase;
    padding:10px 16px;
    border:1px solid var(--line);
    transition:color .2s,border-color .2s;
  }
  .signout-btn:hover{color:var(--error);border-color:rgba(229,115,115,.3)}

  /* ============ LOADING SKELETON ============ */
  /* Shows pulsing placeholders while orders fetch.
   * Prevents blank page during async data load. */
  .orders-loading{ display:flex; flex-direction:column; gap:14px; }
  .skeleton-card{
    background:linear-gradient(160deg, #14110c 0%, #0d0c0a 100%);
    border:1px solid var(--line);
    height:120px;
    position:relative;
    overflow:hidden;
  }
  .skeleton-card::after{
    content:'';
    position:absolute;
    inset:0;
    background:linear-gradient(90deg, transparent, rgba(255,255,250,.04), transparent);
    animation:skeletonShimmer 1.6s ease-in-out infinite;
  }
  @keyframes skeletonShimmer{
    0%{ transform:translateX(-100%); }
    100%{ transform:translateX(100%); }
  }
  /* Visually hidden but readable to screen readers */
  .visually-hidden{
    position:absolute; width:1px; height:1px;
    padding:0; margin:-1px; overflow:hidden;
    clip:rect(0,0,0,0); white-space:nowrap; border:0;
  }
</style>
</head>
<body>

<header class="nav">
  <a href="/" class="logo">TAGLINE</a>
  <div class="nav-links">
    <a href="/" class="nav-link hide-mobile">Continue shopping</a>
    <a href="/cart" class="cart-icon-btn" aria-label="Cart">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M5 7h14l-1.5 12a2 2 0 0 1-2 1.8h-7a2 2 0 0 1-2-1.8L5 7z"/><path d="M9 7V5a3 3 0 0 1 6 0v2"/></svg>
      <span class="cart-badge" data-cart-count style="display:none">0</span>
    </a>
  </div>
</header>

<main class="page">
  <div class="section-marker"><span class="label">Your account</span></div>
  <h1 class="page-title">Hello.</h1>
  <p class="page-sub">Signed in as <span data-user-email style="color:var(--ink)">…</span></p>

  <div style="display:flex;gap:8px;margin-bottom:48px;flex-wrap:wrap">
    <button class="signout-btn" id="signoutBtn">Sign out</button>
  </div>

  <h2 style="font-family:'Space Grotesk',sans-serif;font-size:24px;font-weight:600;letter-spacing:-0.025em;margin-bottom:24px">Order history</h2>

  <div id="ordersContainer">
    <div class="empty">
      <p>Loading your orders…</p>
    </div>
  </div>
</main>

<footer>
  <span>© 2026 TAGLINE</span>
  <a href="/contact">Contact</a>
</footer>

<script src="/tagline-app.js" defer></script>
<script>
(function(){
  function statusClass(s){
    return ['paid','shipped','delivered','cancelled','refunded'].includes(s) ? s : '';
  }

  async function loadOrders() {
    const container = document.getElementById('ordersContainer');
    // Show loading skeleton immediately so users see something
    // (instead of a blank page while the request is in flight)
    container.innerHTML = `
      <div class="orders-loading" aria-live="polite" aria-busy="true">
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
        <span class="visually-hidden">Loading your orders…</span>
      </div>
    `;

    const result = await window.Tagline.API.request('/api/my-orders', { auth:true });
    const esc = window.Tagline.escapeHtml;

    if (!result.ok) {
      container.innerHTML = '';
      const alert = document.createElement('div');
      alert.className = 'alert alert-error';
      alert.setAttribute('role', 'alert');
      alert.textContent = result.error || 'Could not load orders.';
      container.appendChild(alert);
      return;
    }
    const orders = result.orders || [];
    if (orders.length === 0) {
      container.innerHTML = `
        <div class="empty">
          <h2>No orders yet.</h2>
          <p>When you place an order, it'll show up here.</p>
          <a href="/" class="btn btn-primary">Browse the collection</a>
        </div>
      `;
      return;
    }

    container.innerHTML = orders.map(o => {
      const date = new Date(o.created_at).toLocaleDateString('en-US', {
        year:'numeric', month:'short', day:'numeric'
      });
      const itemsList = (o.items || []).map(i =>
        `${esc(i.name)}${i.color ? ' · ' + esc(i.color) : ''} × ${esc(i.quantity)}`
      ).join('<br/>');
      const safeId = esc(o.id.slice(0,8).toUpperCase());
      const safeStatus = esc(o.status);
      const statusClassName = statusClass(o.status); // already validated against allow-list
      return `
        <div class="order-row">
          <div class="order-head">
            <div>
              <div class="order-id">Order #${safeId}</div>
              <div class="order-date">${esc(date)}</div>
              <div class="order-status ${statusClassName}">${safeStatus}</div>
            </div>
            <div style="text-align:right">
              <div class="order-total">$${(o.total_cents/100).toFixed(2)}</div>
            </div>
          </div>
          <div class="order-items">${itemsList}</div>
          ${o.tracking_number ? `<div class="order-tracking"><strong>Tracking:</strong> ${esc(o.tracking_number)}</div>` : ''}
        </div>
      `;
    }).join('');
  }

  function init(){
    // Check preview mode first
    if (window.Tagline?.isPreviewMode && window.Tagline.isPreviewMode()) {
      showPreview();
      return;
    }
    // Try to check
    if (window.Tagline?.checkPreviewMode) {
      window.Tagline.checkPreviewMode().then(preview => {
        if (preview) {
          showPreview();
          return;
        }
        if (!window.Tagline.Auth.isLoggedIn()) {
          window.location.href = '/signin';
          return;
        }
        loadOrders();
      });
    } else {
      // Fallback if tagline-app.js hasn't loaded yet
      if (!window.Tagline?.Auth?.isLoggedIn()) {
        window.location.href = '/signin';
        return;
      }
      loadOrders();
    }
  }

  function showPreview() {
    document.querySelector('main').innerHTML = `
      <div class="page" style="text-align:center;padding-top:80px">
        <div style="width:48px;height:48px;margin:0 auto 24px;color:var(--gold);opacity:.7">
          <svg viewBox="0 0 200 340" fill="currentColor"><path d="M88 0 L112 0 L112 100 L180 100 L180 128 L112 128 L112 340 L88 340 L88 128 L20 128 L20 100 L88 100 Z"/></svg>
        </div>
        <h1 class="page-title">Account coming soon.</h1>
        <p class="page-sub">Order history activates at launch. Browse the collection in the meantime.</p>
        <a href="/" class="btn btn-primary">Browse the collection</a>
      </div>
    `;
  }

  document.getElementById('signoutBtn').addEventListener('click', () => {
    if (confirm('Sign out?')) {
      window.Tagline.Auth.clear();
      window.location.href = '/';
    }
  });

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>

</body>
</html>
