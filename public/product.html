<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#08080a" />
<meta name="color-scheme" content="dark" />
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%2308080a'/%3E%3Cpath d='M14 4 L18 4 L18 14 L28 14 L28 18 L18 18 L18 28 L14 28 L14 18 L4 18 L4 14 L14 14 Z' fill='%23d4a558'/%3E%3C/svg%3E" />
<!-- Title + meta filled in by JS once we know which product. Defaults
     here are used by the parser before JS runs and by crawlers that
     don't execute JS (rare for product pages but defensive). -->
<title>Product — TAGLINE</title>
<meta name="description" content="Custom athletic wear, made to last. God · Health · Wealth." />
<meta property="og:type" content="product" />
<meta property="og:title" content="TAGLINE" id="ogTitle" />
<meta property="og:description" content="Custom athletic wear." id="ogDesc" />
<meta property="og:image" content="" id="ogImage" />
<link rel="canonical" href="" id="canonicalLink" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/styles.css" />

<style>
  /* Two-column on desktop, stack on mobile. Image on the left, info on the right. */
  .pdp-layout{
    display:grid;
    grid-template-columns:1.15fr 1fr;
    gap:48px;
    align-items:start;
    margin-top:32px;
  }
  @media (max-width:980px){ .pdp-layout{grid-template-columns:1fr;gap:24px} }
  @media (max-width:640px){ .pdp-layout{gap:18px;margin-top:18px} }

  /* Big product image — sticks while you scroll the right side on desktop. */
  .pdp-image{
    position:sticky; top:96px;
    background:#f3eee4;
    border:1px solid var(--line);
    aspect-ratio:1/1.1;
    overflow:hidden;
    box-shadow:0 24px 60px -30px rgba(0,0,0,.5);
  }
  @media (max-width:980px){ .pdp-image{position:static;aspect-ratio:1/1} }
  .pdp-image img{
    width:100%; height:100%;
    object-fit:cover;
    display:block;
  }
  .pdp-image-letter{
    width:100%; height:100%;
    display:grid; place-items:center;
    background:linear-gradient(160deg,#1a1814 0%,#0d0c0a 100%);
    font-family:'Space Grotesk', sans-serif;
    font-size:120px; font-weight:600;
    color:rgba(255,255,250,.06);
    letter-spacing:-0.04em;
  }
  .pdp-tag{
    position:absolute;
    top:14px; left:14px;
    background:rgba(8,8,10,.88);
    -webkit-backdrop-filter:blur(10px);
    backdrop-filter:blur(10px);
    border:1px solid rgba(184,137,61,.4);
    color:var(--gold-soft);
    font-size:10px; font-weight:700;
    letter-spacing:.14em; text-transform:uppercase;
    padding:6px 11px;
    border-radius:999px;
    z-index:3;
    box-shadow:0 4px 16px rgba(0,0,0,.3);
  }

  /* Right column */
  .pdp-info{ padding-top:8px; }
  .pdp-eyebrow{
    font-family:'Space Grotesk',sans-serif;
    font-size:11px; letter-spacing:.18em;
    text-transform:uppercase;
    color:var(--gold);
    font-weight:600;
    margin-bottom:10px;
  }
  .pdp-name{
    font-family:'Space Grotesk',sans-serif;
    font-size:32px; font-weight:600;
    letter-spacing:-0.025em;
    color:var(--ink);
    margin:0 0 12px;
    line-height:1.1;
  }
  @media (max-width:640px){ .pdp-name{font-size:26px} }
  .pdp-price{
    font-family:'Inter', sans-serif;
    font-size:22px; font-weight:800;
    color:var(--gold-soft);
    letter-spacing:.02em;
    margin-bottom:8px;
  }
  .pdp-stock{
    font-size:11px; font-weight:600;
    letter-spacing:.12em; text-transform:uppercase;
    color:var(--ink-soft);
    margin-bottom:24px;
  }
  .pdp-stock.low{ color:#e2b56b; }
  .pdp-stock.out{ color:#f3a4a8; }
  .pdp-description{
    font-size:15px;
    color:var(--ink-soft);
    line-height:1.7;
    padding:20px 0;
    border-top:1px solid var(--line);
    border-bottom:1px solid var(--line);
    margin-bottom:24px;
  }
  .pdp-section-label{
    font-size:11px; font-weight:600;
    letter-spacing:.18em;
    text-transform:uppercase;
    color:var(--ink-soft);
    margin-bottom:12px;
  }
  .pdp-size-row{
    display:flex; gap:6px;
    flex-wrap:wrap;
    margin-bottom:24px;
  }
  .pdp-size{
    background:transparent;
    border:1px solid var(--line-strong);
    padding:12px 16px;
    font-size:12px; font-weight:700;
    letter-spacing:.08em;
    color:var(--ink-soft);
    cursor:pointer;
    transition:all .25s;
    min-width:48px; min-height:44px;
    text-align:center;
    font-family:inherit;
  }
  .pdp-size:hover{ color:var(--ink); border-color:var(--ink); }
  .pdp-size.selected{
    background:var(--ink); color:var(--bg);
    border-color:var(--ink);
  }
  .pdp-actions{
    display:flex;
    gap:10px;
    margin-bottom:18px;
  }
  .pdp-add{
    flex:1;
    min-height:52px;
    background:var(--ink);
    color:var(--bg);
    border:1px solid var(--ink);
    font-family:inherit;
    font-size:13px; font-weight:700;
    letter-spacing:.14em; text-transform:uppercase;
    cursor:pointer;
    transition:all .2s;
  }
  .pdp-add:hover:not(:disabled){
    background:var(--gold);
    border-color:var(--gold);
  }
  .pdp-add:disabled{ opacity:.6; cursor:not-allowed; }
  .pdp-add.added{ background:var(--gold); border-color:var(--gold); }
  .pdp-heart{
    width:52px; height:52px;
    background:transparent;
    border:1px solid var(--line-strong);
    color:var(--ink-soft);
    display:grid; place-items:center;
    cursor:pointer;
    transition:all .2s;
  }
  .pdp-heart:hover{ color:var(--ink); border-color:var(--ink); }
  .pdp-heart.active{
    color:#e8505b;
    border-color:rgba(232,80,91,.4);
    background:rgba(232,80,91,.08);
  }
  .pdp-heart svg{ width:20px; height:20px; }
  .pdp-heart.active svg{ fill:currentColor; }
  .pdp-back{
    display:inline-flex; align-items:center; gap:6px;
    font-size:11px; font-weight:600;
    letter-spacing:.14em; text-transform:uppercase;
    color:var(--ink-soft);
    text-decoration:none;
    margin-bottom:24px;
  }
  .pdp-back:hover{ color:var(--gold-soft); }
  .pdp-back svg{ width:14px; height:14px; }

  /* ============ REVIEWS ============
     Verified-buyer star ratings + free-form review body.
     Lives directly under the main product info on PDP. */
  .pdp-reviews{
    margin-top:64px;
    padding-top:32px;
    border-top:1px solid var(--line);
  }
  @media (max-width:640px){ .pdp-reviews{ margin-top:40px; } }
  .pdp-reviews h2{
    font-family:'Space Grotesk',sans-serif;
    font-size:22px; font-weight:600;
    letter-spacing:-0.02em; color:var(--ink);
    margin-bottom:18px;
  }
  .reviews-summary{
    display:flex; gap:24px; align-items:center; flex-wrap:wrap;
    margin-bottom:24px;
    padding-bottom:24px;
    border-bottom:1px solid var(--line);
  }
  .reviews-avg{
    font-family:'Space Grotesk',sans-serif;
    font-size:42px; font-weight:600;
    letter-spacing:-0.025em; color:var(--ink);
    line-height:1;
  }
  .reviews-avg-meta{ color:var(--muted); font-size:13px; margin-top:4px; }
  .reviews-stars{ display:flex; gap:2px; align-items:center; }
  .reviews-stars svg{ width:18px; height:18px; }
  .reviews-stars .star{ color:var(--line-strong); }
  .reviews-stars .star.on{ color:var(--gold-soft); }
  .reviews-empty{
    color:var(--muted); font-size:14px; padding:18px 0;
  }

  .review-card{
    padding:18px 0;
    border-bottom:1px solid var(--line);
  }
  .review-card:last-child{ border-bottom:none; }
  .review-head{
    display:flex; gap:12px; align-items:center; flex-wrap:wrap;
    margin-bottom:6px;
  }
  .review-author{ font-weight:600; color:var(--ink); font-size:14px; }
  .review-date{ color:var(--muted); font-size:12px; }
  .review-verified{
    background:rgba(184,137,61,.12);
    color:var(--gold-soft); font-size:10px; font-weight:600;
    letter-spacing:.12em; text-transform:uppercase;
    padding:3px 8px; border:1px solid rgba(184,137,61,.3);
  }
  .review-title{
    font-family:'Space Grotesk',sans-serif;
    font-size:15px; font-weight:600;
    color:var(--ink); margin:6px 0 4px;
  }
  .review-body{
    color:var(--ink-soft); font-size:14px;
    line-height:1.6;
    white-space:pre-wrap;
    word-break:break-word;
  }

  /* Leave-a-review form */
  .review-form{
    margin-top:32px;
    padding:22px;
    background:linear-gradient(160deg,#14110c 0%,#0d0c0a 100%);
    border:1px solid var(--line);
  }
  .review-form h3{
    font-family:'Space Grotesk',sans-serif;
    font-size:15px; font-weight:600;
    color:var(--ink); margin-bottom:14px;
  }
  .review-form label{
    display:block; font-size:11px; font-weight:600;
    letter-spacing:.16em; text-transform:uppercase;
    color:var(--ink-soft); margin-bottom:6px;
  }
  .review-form input[type=text], .review-form textarea{
    width:100%;
    background:var(--surface);
    border:1px solid var(--line-strong);
    padding:11px 13px;
    color:var(--ink); font-family:inherit;
    font-size:14px; line-height:1.5;
    margin-bottom:14px;
  }
  .review-form input[type=text]:focus, .review-form textarea:focus{
    outline:none; border-color:var(--gold);
  }
  .review-form textarea{ min-height:90px; resize:vertical; }

  /* Star input — bigger, click-to-set, hover-to-preview */
  .star-input{
    display:inline-flex; gap:4px; cursor:pointer;
    margin-bottom:14px;
  }
  .star-input button{
    background:transparent; border:none; padding:4px;
    cursor:pointer; color:var(--line-strong);
    transition:color .15s ease, transform .12s ease;
  }
  .star-input button:hover, .star-input button.preview{ color:var(--gold-soft); }
  .star-input button.on{ color:var(--gold); }
  .star-input button:active{ transform:scale(.92); }
  .star-input svg{ width:26px; height:26px; display:block; }

  .review-form .review-submit-row{
    display:flex; gap:12px; align-items:center; flex-wrap:wrap;
  }
  .review-locked{
    margin-top:32px;
    padding:22px;
    border:1px dashed var(--line-strong);
    background:rgba(0,0,0,.18);
    color:var(--ink-soft); font-size:13px; line-height:1.6;
  }
  .review-locked a{
    color:var(--gold-soft); text-decoration:underline;
    text-underline-offset:3px;
  }
  .review-msg{
    font-size:12px; color:var(--muted); min-height:18px;
  }
  .review-msg.error{ color:var(--error); }
  .review-msg.success{ color:var(--gold-soft); }

  /* PDP rating row — sits just under the product name on the info col. */
  .pdp-rating{
    display:flex; align-items:center; gap:10px;
    margin:-2px 0 12px;
    color:var(--ink-soft);
    font-size:13px;
  }
  .pdp-rating .pdp-stars{ display:flex; gap:2px; }
  .pdp-rating .pdp-stars svg{ width:14px; height:14px; }
  .pdp-rating .pdp-stars .star{ color:var(--line-strong); }
  .pdp-rating .pdp-stars .star.on{ color:var(--gold-soft); }
  .pdp-rating a{ color:var(--gold-soft); text-decoration:underline; text-underline-offset:3px; }

  /* Loading + 404 states */
  .pdp-loading, .pdp-missing{
    text-align:center;
    padding:96px 24px;
    color:var(--ink-soft);
  }
  .pdp-loading h2, .pdp-missing h2{
    font-family:'Space Grotesk',sans-serif;
    font-size:24px;
    color:var(--ink);
    margin-bottom:8px;
  }
  .pdp-missing a{ color:var(--gold-soft); }

  /* Toast — same look as homepage drawer's add-to-cart confirmation */
  .toast{
    position:fixed;
    bottom:24px; left:50%;
    transform:translate3d(-50%, 100px, 0);
    background:linear-gradient(160deg, #14110c 0%, #0d0c0a 100%);
    border:1px solid var(--gold);
    color:var(--ink);
    padding:14px 18px;
    display:flex; align-items:center; gap:14px;
    z-index:400;
    box-shadow:0 12px 40px rgba(0,0,0,.5), 0 0 24px rgba(184,137,61,.2);
    opacity:0;
    transition:transform .4s cubic-bezier(.22,.61,.36,1), opacity .3s ease;
    max-width:calc(100vw - 32px);
  }
  .toast.show{ transform:translate3d(-50%, 0, 0); opacity:1; }
  .toast-icon{
    width:32px; height:32px; border-radius:50%;
    background:var(--gold); color:var(--bg);
    display:grid; place-items:center;
    flex-shrink:0; font-weight:700;
  }
  .toast-text{ flex:1; min-width:0; }
  .toast-title{
    font-size:13px; font-weight:600; color:var(--ink);
    margin-bottom:2px;
  }
  .toast-sub{
    font-size:12px; color:var(--ink-soft);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  @media (max-width:480px){
    .toast{ left:16px; right:16px; transform:translate3d(0, 100px, 0); bottom:16px; width:auto; max-width:none; }
    .toast.show{ transform:translate3d(0, 0, 0); }
  }
</style>
</head>

<script src="/tagline-app.js" defer></script>
<script>
(function(){
  'use strict';

  // Pull the product ID out of /products/<id>
  const pathMatch = window.location.pathname.match(/^\/products\/([a-z0-9-]+)$/i);
  const productId = pathMatch ? pathMatch[1].toLowerCase() : null;

  let selectedSize = null;

  function ready(fn) {
    if (window.Tagline && window.Tagline.PRODUCTS) return fn();
    let tries = 0;
    const id = setInterval(() => {
      tries++;
      if (window.Tagline && window.Tagline.PRODUCTS) {
        clearInterval(id);
        fn();
      } else if (tries > 60) {
        // 3 seconds and no Tagline — give up
        clearInterval(id);
        renderMissing('Could not load product catalog. Refresh and try again.');
      }
    }, 50);
  }

  function escapeHtml(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  function renderMissing(msg) {
    document.getElementById('pdpContent').innerHTML = `
      <div class="pdp-missing">
        <h2>Product not found</h2>
        <p>${escapeHtml(msg || 'We can\'t find that piece.')}</p>
        <p style="margin-top:18px"><a href="/">← Back to the collection</a></p>
      </div>`;
    document.title = 'Product not found — TAGLINE';
  }

  function isValidImageUrl(u) {
    return typeof u === 'string' && /^https?:\/\//i.test(u);
  }

  function render(p) {
    if (!p) return renderMissing();

    const SIZES = ['XS','S','M','L','XL','XXL'];
    const isOut = p.stock === 0;
    const isLow = !isOut && p.stock <= 10;

    const tagHtml = p.tag
      ? `<span class="pdp-tag">${escapeHtml(p.tag)}</span>`
      : '';
    const imageHtml = isValidImageUrl(p.image_url)
      ? `<img src="${escapeHtml(p.image_url)}" alt="${escapeHtml(p.name)}" />`
      : `<div class="pdp-image-letter">${escapeHtml((p.name || '?').charAt(0))}</div>`;

    const stockClass = isOut ? 'out' : (isLow ? 'low' : '');
    const stockText = isOut ? 'Sold out' : (isLow ? `Only ${p.stock} left` : 'In stock');

    const wishlistOn = window.Tagline?.Wishlist?.has?.(productId) ? 'active' : '';
    const heartLabel = wishlistOn ? 'Remove from wishlist' : 'Add to wishlist';

    document.getElementById('pdpContent').innerHTML = `
      <div class="pdp-layout">
        <div class="pdp-image">
          ${tagHtml}
          ${imageHtml}
        </div>
        <div class="pdp-info">
          <div class="pdp-eyebrow">${escapeHtml(p.category || 'TAGLINE')}</div>
          <h1 class="pdp-name">${escapeHtml(p.name)}</h1>
          <div class="pdp-rating" id="pdpRating" hidden></div>
          <div class="pdp-price">$${escapeHtml(String(p.price))}</div>
          <div class="pdp-stock ${stockClass}">${stockText}</div>
          <div class="pdp-description">${escapeHtml(p.description || 'Premium athletic wear, made to last.')}</div>

          <div class="pdp-section-label">Size</div>
          <div class="pdp-size-row" id="pdpSizes">
            ${SIZES.map(s => `<button type="button" class="pdp-size" data-size="${s}" ${isOut ? 'disabled' : ''}>${s}</button>`).join('')}
          </div>

          <div class="pdp-actions">
            <button type="button" class="pdp-add" id="pdpAdd" ${isOut ? 'disabled' : ''}>${isOut ? 'Sold out' : 'Select a size'}</button>
            <button type="button" class="pdp-heart ${wishlistOn}" id="pdpHeart" aria-label="${heartLabel}">
              <svg fill="${wishlistOn ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="1.6" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
            </button>
          </div>
        </div>
      </div>

      <section class="pdp-reviews" id="pdpReviews" aria-label="Customer reviews">
        <h2>Customer reviews</h2>
        <div id="reviewsContent">
          <div class="reviews-empty">Loading reviews…</div>
        </div>
        <div id="reviewWriteSlot"></div>
      </section>
    `;

    wireActions(p);
    setMeta(p);
    injectJsonLd(p);
    loadReviews(p);
  }

  // ============ REVIEWS ============
  // Star SVG used in both the summary header and individual review cards.
  function starSvg(filled) {
    const cls = filled ? 'star on' : 'star';
    return `<svg class="${cls}" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 2 L14.39 8.36 L21 9.27 L16.18 14.14 L17.41 21 L12 17.77 L6.59 21 L7.82 14.14 L3 9.27 L9.61 8.36 Z"/></svg>`;
  }

  // Render the X-out-of-5 stars row given a 0-5 numeric rating.
  // 4.6 → 5 filled / 0 empty (we don't do half-stars; cleaner visual).
  // We round half-up at .5 so a 4.5 average looks like ★★★★★.
  function starsRow(rating) {
    const r = Math.round(Math.max(0, Math.min(5, Number(rating) || 0)));
    let html = '';
    for (let i = 1; i <= 5; i++) html += starSvg(i <= r);
    return html;
  }

  function fmtReviewDate(iso) {
    try {
      return new Date(iso).toLocaleDateString('en-US', { year:'numeric', month:'short', day:'numeric' });
    } catch { return ''; }
  }

  async function loadReviews(p) {
    const target = document.getElementById('reviewsContent');
    if (!target) return;
    let data;
    try {
      const res = await fetch('/api/reviews?product_id=' + encodeURIComponent(productId));
      if (res.status === 404) {
        target.innerHTML = '';
        return;
      }
      data = await res.json().catch(() => ({}));
      if (!res.ok || !data) {
        target.innerHTML = '<div class="reviews-empty">Reviews are temporarily unavailable.</div>';
        return;
      }
    } catch {
      target.innerHTML = '<div class="reviews-empty">Could not load reviews.</div>';
      return;
    }

    const summary = data.summary || { count: 0, average: 0 };
    const reviews = Array.isArray(data.reviews) ? data.reviews : [];

    // Surface the average + count up at the top of the info column too,
    // so customers see social proof without scrolling.
    const ratingRow = document.getElementById('pdpRating');
    if (ratingRow) {
      if (summary.count > 0) {
        ratingRow.innerHTML = `
          <div class="pdp-stars">${starsRow(summary.average)}</div>
          <a href="#pdpReviews">${escapeHtml(String(summary.average))} (${escapeHtml(String(summary.count))} review${summary.count === 1 ? '' : 's'})</a>
        `;
        ratingRow.hidden = false;
      } else {
        ratingRow.hidden = true;
      }
    }

    if (reviews.length === 0) {
      target.innerHTML = '<div class="reviews-empty">No reviews yet. Be the first — only verified buyers can post.</div>';
    } else {
      const head = `
        <div class="reviews-summary">
          <div>
            <div class="reviews-avg">${escapeHtml(String(summary.average.toFixed(1)))}</div>
            <div class="reviews-avg-meta">out of 5 · ${escapeHtml(String(summary.count))} review${summary.count === 1 ? '' : 's'}</div>
          </div>
          <div class="reviews-stars" aria-hidden="true">${starsRow(summary.average)}</div>
        </div>
      `;
      const cards = reviews.map(r => `
        <div class="review-card">
          <div class="review-head">
            <div class="reviews-stars" aria-label="${escapeHtml(String(r.rating))} out of 5 stars">${starsRow(r.rating)}</div>
            <span class="review-author">${escapeHtml(r.display_name || 'Verified buyer')}</span>
            <span class="review-verified">Verified buyer</span>
            <span class="review-date">${escapeHtml(fmtReviewDate(r.created_at))}</span>
          </div>
          ${r.title ? `<div class="review-title">${escapeHtml(r.title)}</div>` : ''}
          ${r.body ? `<div class="review-body">${escapeHtml(r.body)}</div>` : ''}
        </div>
      `).join('');
      target.innerHTML = head + cards;
    }

    renderReviewWriteSlot(p);
  }

  // Render the "Leave a review" form (or a sign-in prompt) below the
  // reviews list. Verified-buyer enforcement happens server-side; the
  // client just nudges the right CTA based on auth state.
  function renderReviewWriteSlot(p) {
    const slot = document.getElementById('reviewWriteSlot');
    if (!slot) return;

    const signedIn = !!window.Tagline?.Auth?.isLoggedIn?.();
    if (!signedIn) {
      slot.innerHTML = `
        <div class="review-locked">
          Reviews are limited to verified buyers. <a href="/signin?next=${encodeURIComponent(window.location.pathname)}">Sign in</a>
          if you've already bought this — or
          <a href="/signup">create an account</a> after your order ships.
        </div>
      `;
      return;
    }

    slot.innerHTML = `
      <form class="review-form" id="reviewForm" novalidate>
        <h3>Leave a review</h3>
        <label>Rating</label>
        <div class="star-input" id="starInput" role="radiogroup" aria-label="Rating">
          ${[1,2,3,4,5].map(n => `<button type="button" data-star="${n}" role="radio" aria-checked="false" aria-label="${n} star${n === 1 ? '' : 's'}"><svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 2 L14.39 8.36 L21 9.27 L16.18 14.14 L17.41 21 L12 17.77 L6.59 21 L7.82 14.14 L3 9.27 L9.61 8.36 Z"/></svg></button>`).join('')}
        </div>
        <label for="reviewTitle">Title (optional)</label>
        <input type="text" id="reviewTitle" maxlength="120" placeholder="Sums up your take in one line" />
        <label for="reviewBody">Review</label>
        <textarea id="reviewBody" maxlength="2000" placeholder="What did you like? How did it fit?"></textarea>
        <div class="review-submit-row">
          <button type="submit" class="btn btn-primary" style="padding:11px 22px;min-height:42px;font-size:12px">Submit review</button>
          <span class="review-msg" id="reviewMsg"></span>
        </div>
      </form>
    `;

    let chosen = 0;
    const starButtons = slot.querySelectorAll('.star-input button');
    starButtons.forEach(btn => {
      const n = Number(btn.dataset.star);
      btn.addEventListener('mouseenter', () => {
        starButtons.forEach((b, i) => b.classList.toggle('preview', i < n));
      });
      btn.addEventListener('mouseleave', () => {
        starButtons.forEach(b => b.classList.remove('preview'));
      });
      btn.addEventListener('click', () => {
        chosen = n;
        starButtons.forEach((b, i) => {
          const on = i < n;
          b.classList.toggle('on', on);
          b.setAttribute('aria-checked', on ? 'true' : 'false');
        });
      });
    });

    const form = slot.querySelector('#reviewForm');
    const msg = slot.querySelector('#reviewMsg');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      msg.className = 'review-msg';
      if (chosen < 1 || chosen > 5) {
        msg.textContent = 'Pick a star rating first.';
        msg.className = 'review-msg error';
        return;
      }
      const submitBtn = form.querySelector('button[type="submit"]');
      submitBtn.disabled = true;
      msg.textContent = 'Submitting…';

      const result = await window.Tagline.API.request('/api/reviews', {
        method: 'POST',
        body: {
          product_id: productId,
          rating: chosen,
          title: form.querySelector('#reviewTitle').value.trim(),
          body:  form.querySelector('#reviewBody').value.trim()
        },
        auth: true
      });

      submitBtn.disabled = false;
      if (result.ok) {
        msg.textContent = 'Thanks! Your review is live.';
        msg.className = 'review-msg success';
        form.querySelector('#reviewTitle').value = '';
        form.querySelector('#reviewBody').value = '';
        // Refresh the reviews list so the new one appears immediately
        loadReviews(p);
      } else {
        msg.textContent = result.error || 'Could not save review.';
        msg.className = 'review-msg error';
      }
    });
  }

  function wireActions(p) {
    document.querySelectorAll('.pdp-size').forEach(btn => {
      btn.addEventListener('click', () => {
        if (btn.disabled) return;
        selectedSize = btn.dataset.size;
        document.querySelectorAll('.pdp-size').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        const add = document.getElementById('pdpAdd');
        add.disabled = false;
        add.textContent = 'Add to cart';
      });
    });

    document.getElementById('pdpAdd').addEventListener('click', () => {
      if (!selectedSize) return;
      const Cart = window.Tagline?.Cart;
      if (!Cart) return;
      const ok = Cart.add(productId, 1, { size: selectedSize });
      if (ok) {
        const btn = document.getElementById('pdpAdd');
        btn.classList.add('added');
        btn.textContent = 'Added ✓';
        showToast(p, selectedSize);
        setTimeout(() => {
          btn.classList.remove('added');
          btn.textContent = 'Add to cart';
        }, 2200);
      }
    });

    document.getElementById('pdpHeart').addEventListener('click', () => {
      const Wishlist = window.Tagline?.Wishlist;
      if (!Wishlist) return;
      Wishlist.toggle(productId);
      const heart = document.getElementById('pdpHeart');
      const isOn = Wishlist.has(productId);
      heart.classList.toggle('active', isOn);
      heart.querySelector('svg').setAttribute('fill', isOn ? 'currentColor' : 'none');
      heart.setAttribute('aria-label', isOn ? 'Remove from wishlist' : 'Add to wishlist');
    });
  }

  function showToast(p, size) {
    const toast = document.getElementById('addToCartToast');
    const sub = document.getElementById('toastSub');
    if (!toast) return;
    sub.textContent = `${p.name} · Size ${size}`;
    toast.removeAttribute('hidden');
    toast.classList.add('show');
    setTimeout(() => {
      toast.classList.remove('show');
      setTimeout(() => toast.setAttribute('hidden', ''), 300);
    }, 2200);
  }

  function setMeta(p) {
    const title = `${p.name} — TAGLINE`;
    document.title = title;
    document.querySelector('meta[name="description"]').setAttribute('content', p.description || `${p.name} from TAGLINE.`);
    document.getElementById('ogTitle').setAttribute('content', title);
    document.getElementById('ogDesc').setAttribute('content', p.description || '');
    if (p.image_url) document.getElementById('ogImage').setAttribute('content', p.image_url);
    document.getElementById('canonicalLink').setAttribute('href', window.location.origin + window.location.pathname);
  }

  function injectJsonLd(p) {
    if (document.getElementById('pdpJsonLd')) return;
    const data = {
      "@context": "https://schema.org",
      "@type": "Product",
      "name": p.name,
      "description": p.description || '',
      "sku": productId,
      "category": p.category,
      "brand": { "@type": "Brand", "name": "TAGLINE" },
      "image": p.image_url ? [p.image_url] : [],
      "offers": {
        "@type": "Offer",
        "url": window.location.href,
        "priceCurrency": "USD",
        "price": Number(p.price).toFixed(2),
        "availability": p.stock > 0 ? "https://schema.org/InStock" : "https://schema.org/OutOfStock",
        "itemCondition": "https://schema.org/NewCondition",
        "shippingDetails": {
          "@type": "OfferShippingDetails",
          "shippingRate": { "@type": "MonetaryAmount", "value": "0", "currency": "USD" },
          "shippingDestination": { "@type": "DefinedRegion", "addressCountry": ["US", "CA"] },
          "deliveryTime": {
            "@type": "ShippingDeliveryTime",
            "businessDays": { "@type": "OpeningHoursSpecification", "dayOfWeek": ["Monday","Tuesday","Wednesday","Thursday","Friday"] },
            "transitTime": { "@type": "QuantitativeValue", "minValue": 5, "maxValue": 7, "unitCode": "DAY" }
          }
        },
        "hasMerchantReturnPolicy": {
          "@type": "MerchantReturnPolicy",
          "applicableCountry": "US",
          "returnPolicyCategory": "https://schema.org/MerchantReturnFiniteReturnWindow",
          "merchantReturnDays": 30,
          "returnMethod": "https://schema.org/ReturnByMail",
          "returnFees": "https://schema.org/FreeReturn"
        }
      }
    };
    const s = document.createElement('script');
    s.type = 'application/ld+json';
    s.id = 'pdpJsonLd';
    s.textContent = JSON.stringify(data);
    document.head.appendChild(s);

    // BreadcrumbList — helps Google show "Home › Tops › Product" in
    // search results. Category may be missing on legacy products; in
    // that case we drop the middle crumb.
    const crumbs = [{ "@type": "ListItem", "position": 1, "name": "Home", "item": window.location.origin + "/" }];
    if (p.category) {
      crumbs.push({ "@type": "ListItem", "position": 2, "name": p.category, "item": window.location.origin + "/#shop" });
    }
    crumbs.push({ "@type": "ListItem", "position": crumbs.length + 1, "name": p.name, "item": window.location.href });
    const bc = {
      "@context": "https://schema.org",
      "@type": "BreadcrumbList",
      "itemListElement": crumbs
    };
    const sc = document.createElement('script');
    sc.type = 'application/ld+json';
    sc.id = 'pdpBreadcrumbLd';
    sc.textContent = JSON.stringify(bc);
    document.head.appendChild(sc);
  }

  // Init
  if (!productId) {
    renderMissing('No product ID in the URL.');
    return;
  }
  ready(() => {
    const p = window.Tagline.PRODUCTS[productId];
    if (!p) {
      renderMissing(`No product with id "${productId}".`);
      return;
    }
    render(p);
  });
})();
</script>

</body>
</html>
