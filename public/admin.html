<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#08080a" />
<meta name="color-scheme" content="dark" />
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%2308080a'/%3E%3Cpath d='M14 4 L18 4 L18 14 L28 14 L28 18 L18 18 L18 28 L14 28 L14 18 L4 18 L4 14 L14 14 Z' fill='%23d4a558'/%3E%3C/svg%3E" />
<title>Admin — TAGLINE</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/styles.css" />

<style>
  .admin-tabs{
    display:flex;gap:24px;
    border-bottom:1px solid var(--line);
    margin-bottom:36px;
    overflow-x:auto;
    -webkit-overflow-scrolling:touch;
  }
  .admin-tabs::-webkit-scrollbar{display:none}
  .admin-tab{
    background:transparent;
    color:var(--muted);
    font-size:13px;font-weight:500;
    padding:14px 0;
    border-bottom:2px solid transparent;
    white-space:nowrap;
    transition:color .2s,border-color .2s;
  }
  .admin-tab.active{
    color:var(--ink);
    border-bottom-color:var(--gold);
  }

  .stats-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:14px;
    margin-bottom:36px;
  }
  .stat-card{
    background:linear-gradient(160deg,#14110c 0%,#0d0c0a 100%);
    border:1px solid var(--line);
    padding:20px 24px;
  }
  .stat-label{
    font-size:11px;font-weight:600;
    letter-spacing:.18em;text-transform:uppercase;
    color:var(--gold);
    margin-bottom:8px;
  }
  .stat-value{
    font-family:'Space Grotesk',sans-serif;
    font-size:28px;font-weight:600;
    color:var(--ink);
    letter-spacing:-0.02em;
  }

  .data-table{
    width:100%;
    background:linear-gradient(160deg,#14110c 0%,#0d0c0a 100%);
    border:1px solid var(--line);
    border-collapse:collapse;
  }
  .data-table th, .data-table td{
    padding:14px 18px;
    text-align:left;
    font-size:13px;
    border-bottom:1px solid var(--line);
    vertical-align:top;
  }
  .data-table th{
    font-size:10px;font-weight:600;
    letter-spacing:.18em;text-transform:uppercase;
    color:var(--gold);
    background:rgba(0,0,0,.2);
  }
  .data-table tr:last-child td{border-bottom:none}
  .data-table td.mono{
    font-family:'Space Grotesk',sans-serif;
    color:var(--ink-soft);
  }
  .data-table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}

  .status-pill{
    display:inline-block;padding:3px 8px;
    font-size:10px;font-weight:600;
    letter-spacing:.12em;text-transform:uppercase;
    border:1px solid var(--line-strong);
  }
  .status-pill.paid{color:var(--gold-soft);border-color:rgba(184,137,61,.4)}
  .status-pill.shipped{color:#7ba8d8;border-color:rgba(123,168,216,.4)}
  .status-pill.delivered{color:#7dc88a;border-color:rgba(125,200,138,.4)}
  .status-pill.pending{color:var(--muted)}
  .status-pill.cancelled,.status-pill.refunded,.status-pill.new{color:var(--error);border-color:rgba(229,115,115,.3)}

  .auth-prompt{
    max-width:420px;margin:120px auto;
    background:linear-gradient(160deg,#14110c 0%,#0d0c0a 100%);
    border:1px solid var(--line);
    padding:40px;
    text-align:center;
  }
  .auth-prompt h2{
    font-family:'Space Grotesk',sans-serif;
    font-size:24px;font-weight:600;
    margin-bottom:12px;letter-spacing:-0.025em;
  }
  .auth-prompt p{color:var(--ink-soft);margin-bottom:24px;font-size:14px}

  /* ============ PRODUCT EDITOR ============ */
  .pe-row{
    background:linear-gradient(160deg,#14110c 0%,#0d0c0a 100%);
    border:1px solid var(--line);
    margin-bottom:8px;
    transition:border-color .2s;
  }
  .pe-row:hover{ border-color:var(--line-strong); }
  .pe-summary{
    display:grid;
    grid-template-columns:60px 1fr auto auto auto;
    gap:14px;
    align-items:center;
    padding:12px 16px;
    cursor:pointer;
  }
  @media (max-width:640px){
    .pe-summary{
      grid-template-columns:48px 1fr auto;
      gap:10px;
      padding:10px 12px;
    }
    .pe-stock-cell, .pe-active-cell{ display:none; }
  }
  .pe-thumb{
    width:60px; height:60px;
    background:linear-gradient(160deg,#1a1814 0%,#0d0c0a 100%);
    border:1px solid var(--line);
    display:grid; place-items:center;
    color:rgba(255,255,250,.18);
    font-family:'Space Grotesk',sans-serif;
    font-size:22px; font-weight:600;
    overflow:hidden;
  }
  @media (max-width:640px){ .pe-thumb{ width:48px; height:48px; font-size:18px; } }
  .pe-thumb img{ width:100%; height:100%; object-fit:cover; }
  .pe-name{ font-size:13px; font-weight:500; color:var(--ink); margin-bottom:2px; }
  .pe-meta{ font-size:11px; color:var(--muted); letter-spacing:.04em; }
  .pe-price{
    font-family:'Space Grotesk',sans-serif;
    font-size:13px; font-weight:600;
    color:var(--gold-soft);
  }
  .pe-stock-cell{
    font-size:11px;
    color:var(--ink-soft);
    text-align:right;
    min-width:50px;
  }
  .pe-active-cell{ font-size:11px; }
  .pe-active-cell .pill-yes{
    color:var(--gold-soft);
    border:1px solid rgba(184,137,61,.4);
    padding:3px 10px;
    font-size:10px;
    text-transform:uppercase;
    letter-spacing:.12em;
  }
  .pe-active-cell .pill-no{
    color:var(--muted);
    border:1px solid var(--line-strong);
    padding:3px 10px;
    font-size:10px;
    text-transform:uppercase;
    letter-spacing:.12em;
  }

  .pe-form{
    display:none;
    padding:18px;
    border-top:1px solid var(--line);
    background:rgba(0,0,0,.15);
  }
  .pe-row.editing .pe-form{ display:block; }
  .pe-form .pe-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
    margin-bottom:14px;
  }
  @media (max-width:640px){ .pe-form .pe-grid{ grid-template-columns:1fr; } }
  .pe-form label{
    display:block;
    font-size:10px; font-weight:600;
    letter-spacing:.18em;
    text-transform:uppercase;
    color:var(--ink-soft);
    margin-bottom:6px;
  }
  .pe-form input, .pe-form select, .pe-form textarea{
    width:100%;
    background:var(--surface);
    border:1px solid var(--line-strong);
    color:var(--ink);
    padding:10px 12px;
    font-family:inherit;
    font-size:13px;
    outline:none;
  }
  .pe-form input:focus, .pe-form select:focus, .pe-form textarea:focus{
    border-color:var(--gold);
  }
  .pe-form textarea{ resize:vertical; min-height:60px; line-height:1.5; }
  .pe-actions{
    display:flex; justify-content:flex-end; gap:8px;
    margin-top:14px;
    padding-top:14px;
    border-top:1px solid var(--line);
  }
  .pe-btn{
    background:transparent;
    border:1px solid var(--line-strong);
    color:var(--ink-soft);
    font-family:inherit;
    font-size:11px;
    font-weight:600;
    letter-spacing:.08em;
    text-transform:uppercase;
    padding:8px 16px;
    cursor:pointer;
    transition:all .2s;
  }
  .pe-btn:hover{ background:rgba(255,255,250,.04); color:var(--ink); border-color:var(--ink-soft); }
  .pe-btn.primary{
    background:var(--ink);
    color:var(--bg);
    border-color:var(--ink);
  }
  .pe-btn.primary:hover{ background:var(--gold); border-color:var(--gold); color:var(--bg); }
  .pe-btn:disabled{ opacity:.5; cursor:not-allowed; }
  .pe-help{ font-size:11px; color:var(--muted); margin-top:4px; line-height:1.5; }
  .pe-imgprev{
    margin-top:10px;
    padding:8px;
    border:1px dashed var(--line-strong);
    background:rgba(0,0,0,.18);
    display:inline-block;
    max-width:100%;
  }
  .pe-imgprev img{
    max-width:140px; max-height:140px;
    object-fit:cover;
    display:block;
    background:linear-gradient(160deg,#1a1814 0%,#0d0c0a 100%);
  }
  .pe-imgprev .err{
    color:var(--error); font-size:11px;
    padding:8px 12px;
  }
  .pe-status{
    font-size:11px;
    color:var(--gold-soft);
    margin-top:8px;
    min-height:14px;
  }
  .pe-status.error{ color:var(--error); }

  /* Export buttons row above the data tables */
  .table-actions{
    display:flex;justify-content:flex-end;gap:8px;
    margin-bottom:12px;
    flex-wrap:wrap;
  }
  .export-btn{
    background:transparent;
    color:var(--ink-soft);
    border:1px solid var(--line-strong);
    font-size:11px;
    font-weight:600;
    letter-spacing:.08em;
    text-transform:uppercase;
    padding:8px 14px;
    cursor:pointer;
    transition:background .2s, color .2s, border-color .2s;
  }
  .export-btn:hover{
    background:rgba(255,255,250,.04);
    color:var(--ink);
    border-color:var(--ink-soft);
  }
  .export-btn:disabled{opacity:.5;cursor:not-allowed}

  /* ============ SETUP CHECKLIST ============ */
  .setup-wrap{ display:flex; flex-direction:column; gap:10px; }
  .setup-banner{
    padding:14px 18px;
    border:1px solid var(--line);
    font-size:14px;
    line-height:1.5;
    margin-bottom:6px;
  }
  .setup-banner.ok{ border-color:rgba(184,137,61,.5); background:rgba(184,137,61,.08); color:var(--gold-soft); }
  .setup-banner.warn{ border-color:rgba(212,165,88,.45); background:rgba(212,165,88,.06); color:var(--ink); }
  .setup-banner.err{ border-color:rgba(232,80,91,.5); background:rgba(232,80,91,.08); color:#f3a4a8; }
  .setup-item{
    border:1px solid var(--line);
    background:linear-gradient(160deg,#14110c 0%,#0d0c0a 100%);
    padding:14px 16px;
    display:flex; flex-direction:column; gap:8px;
  }
  .setup-item.err{ border-color:rgba(232,80,91,.35); }
  .setup-item.warn{ border-color:var(--line); }
  .setup-item.ok{ border-color:rgba(184,137,61,.25); }
  .setup-head{ display:flex; align-items:center; gap:12px; }
  .setup-icon{
    width:24px; height:24px;
    border-radius:50%;
    display:grid; place-items:center;
    font-weight:700; font-size:12px;
    flex-shrink:0;
  }
  .setup-icon.ok{ background:rgba(184,137,61,.16); color:var(--gold-soft); border:1px solid rgba(184,137,61,.45); }
  .setup-icon.err{ background:rgba(232,80,91,.18); color:#f3a4a8; border:1px solid rgba(232,80,91,.45); }
  .setup-icon.warn{ background:rgba(255,255,250,.06); color:var(--ink-soft); border:1px solid var(--line-strong); }
  .setup-name{ font-size:14px; font-weight:700; color:var(--ink); flex:1; }
  .setup-req{
    display:inline-block;
    margin-left:8px;
    font-size:9px; font-weight:700;
    letter-spacing:.16em;
    text-transform:uppercase;
    color:#f3a4a8;
    background:rgba(232,80,91,.12);
    border:1px solid rgba(232,80,91,.4);
    padding:2px 7px;
    border-radius:999px;
  }
  .setup-missing{
    font-size:12px;
    color:var(--ink-soft);
    padding-left:36px;
  }
  .setup-missing code{
    background:rgba(232,80,91,.12);
    color:#f3a4a8;
    padding:2px 6px;
    font-family:'Space Grotesk',monospace;
    font-size:11px;
    letter-spacing:.04em;
  }
  .setup-hint{
    font-size:12px;
    color:var(--ink-soft);
    padding-left:36px;
    line-height:1.6;
  }
  .setup-hint.ok{ color:var(--gold-soft); }
  .setup-live{
    font-size:11px;
    padding-left:36px;
    letter-spacing:.04em;
  }
  .setup-live.ok{ color:var(--gold-soft); }
  .setup-live.err{ color:#f3a4a8; }
  .setup-docs{
    align-self:flex-start;
    margin-left:36px;
    font-size:11px;
    font-weight:700;
    letter-spacing:.12em;
    text-transform:uppercase;
    color:var(--gold-soft);
    text-decoration:none;
    border-bottom:1px solid rgba(184,137,61,.3);
    padding-bottom:2px;
  }
  .setup-docs:hover{ color:var(--gold); border-bottom-color:var(--gold); }

  /* ============ PHOTO UPLOAD + CROP ============ */
  .pe-upload-row{
    display:flex; gap:8px; align-items:center;
    margin-top:8px;
    flex-wrap:wrap;
  }
  .pe-upload-btn{
    background:rgba(184,137,61,.1);
    border:1px solid rgba(184,137,61,.4);
    color:var(--gold-soft);
    font-family:inherit;
    font-size:11px;
    font-weight:700;
    letter-spacing:.1em;
    text-transform:uppercase;
    padding:8px 14px;
    cursor:pointer;
    transition:all .2s;
    display:inline-flex; align-items:center; gap:6px;
  }
  .pe-upload-btn:hover{ background:rgba(184,137,61,.18); }
  .pe-upload-btn:disabled{ opacity:.5; cursor:wait; }
  .pe-upload-btn svg{ width:14px; height:14px; }
  .pe-upload-status{
    font-size:11px;
    color:var(--ink-soft);
  }

  /* Crop modal — fixed full-screen overlay with the image + crop frame */
  .crop-modal{
    position:fixed; inset:0;
    background:rgba(8,8,10,.94);
    -webkit-backdrop-filter:blur(8px);
    backdrop-filter:blur(8px);
    z-index:9999;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    padding:24px;
    padding-top:calc(24px + env(safe-area-inset-top));
    padding-bottom:calc(24px + env(safe-area-inset-bottom));
    overscroll-behavior:contain;
    touch-action:none;
  }
  .crop-modal[hidden]{ display:none; }
  .crop-stage{
    position:relative;
    max-width:min(90vw, 600px);
    max-height:60vh;
    background:#0d0c0a;
    border:1px solid var(--line);
    user-select:none;
    -webkit-user-select:none;
    overflow:hidden;
    display:flex; align-items:center; justify-content:center;
  }
  #cropImage{
    display:block;
    max-width:100%;
    max-height:60vh;
    width:auto; height:auto;
    pointer-events:none;
    user-select:none;
    -webkit-user-drag:none;
  }
  /* The frame is the SQUARE the user is keeping. Everything outside is
     the discarded area, dimmed via four shaded overlays. */
  .crop-frame{
    position:absolute;
    border:2px solid var(--gold);
    box-shadow:0 0 0 9999px rgba(8,8,10,.6);
    cursor:grab;
    touch-action:none;
  }
  .crop-frame:active{ cursor:grabbing; }
  /* Subtle rule-of-thirds grid lines for visual aid */
  .crop-frame::before, .crop-frame::after{
    content:'';
    position:absolute; inset:0;
    pointer-events:none;
    background:
      linear-gradient(to right, transparent 33.33%, rgba(255,255,255,.25) 33.33%, rgba(255,255,255,.25) 33.6%, transparent 33.6%, transparent 66.66%, rgba(255,255,255,.25) 66.66%, rgba(255,255,255,.25) 66.93%, transparent 66.93%);
  }
  .crop-frame::after{
    background:
      linear-gradient(to bottom, transparent 33.33%, rgba(255,255,255,.25) 33.33%, rgba(255,255,255,.25) 33.6%, transparent 33.6%, transparent 66.66%, rgba(255,255,255,.25) 66.66%, rgba(255,255,255,.25) 66.93%, transparent 66.93%);
  }
  .crop-controls{
    margin-top:24px;
    display:flex; flex-direction:column;
    align-items:center; gap:14px;
    max-width:min(90vw, 600px);
    width:100%;
  }
  .crop-hint{
    color:var(--ink-soft);
    font-size:13px;
    margin:0;
    text-align:center;
    line-height:1.4;
  }
  .crop-buttons{
    display:flex; gap:10px;
    width:100%;
    max-width:400px;
  }
  .crop-btn{
    flex:1;
    background:transparent;
    border:1px solid var(--line-strong);
    color:var(--ink-soft);
    font-family:inherit;
    font-size:13px; font-weight:700;
    letter-spacing:.1em;
    text-transform:uppercase;
    padding:14px 18px;
    cursor:pointer;
    transition:all .2s;
    min-height:48px;
  }
  .crop-btn:hover{ background:rgba(255,255,250,.04); color:var(--ink); }
  .crop-btn.primary{
    background:var(--gold);
    color:#08080a;
    border-color:var(--gold);
  }
  .crop-btn.primary:hover{ background:var(--gold-soft); border-color:var(--gold-soft); }
  .crop-btn:disabled{ opacity:.5; cursor:wait; }
</style>
</head>
<body>
<a class="skip-link" href="#main">Skip to content</a>

<header class="nav">
  <a href="/" class="logo">TAGLINE</a>
  <div class="nav-links">
    <span class="nav-link" style="color:var(--gold-soft)">Admin</span>
    <button id="logoutBtn" class="signout-btn" style="background:transparent;color:var(--muted);font-size:11px;letter-spacing:.08em;text-transform:uppercase;padding:8px 14px;border:1px solid var(--line);display:none">Lock</button>
  </div>
</header>

<main class="page-wide" id="main" tabindex="-1">
  <!-- populated by JS -->
</main>

<script>
(function(){
  const KEY_STORAGE = 'tagline_admin_key';
  const main = document.getElementById('main');
  const logoutBtn = document.getElementById('logoutBtn');

  // Admin key lives in sessionStorage so it dies when the tab/window
  // closes — never persisted to disk via localStorage. Trade-off:
  // admin re-enters key on each new browser session, which is the
  // right call for a credential that authorizes destructive ops
  // (refunds, status edits, product deletion). Migrate any pre-existing
  // localStorage value over once and clear it.
  (function migrateAdminKey(){
    try {
      const legacy = localStorage.getItem(KEY_STORAGE);
      if (legacy && !sessionStorage.getItem(KEY_STORAGE)) {
        sessionStorage.setItem(KEY_STORAGE, legacy);
      }
      localStorage.removeItem(KEY_STORAGE);
    } catch {}
  })();
  function getKey(){ return sessionStorage.getItem(KEY_STORAGE); }
  function setKey(k){ sessionStorage.setItem(KEY_STORAGE, k); }
  function clearKey(){ sessionStorage.removeItem(KEY_STORAGE); }

  // Auth token may be in localStorage (Remember me) or sessionStorage (single
  // session). tagline-app.js writes to whichever the user picked at sign-in.
  function readToken() {
    try {
      const t = localStorage.getItem('tagline_token') || sessionStorage.getItem('tagline_token') || '';
      return /^[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+$/.test(t) ? t : '';
    } catch { return ''; }
  }

  // Admin fetch — wraps the raw response with consistent shape so callers
  // don't have to handle non-JSON responses, network errors, or 404s.
  // Sends BOTH the X-Admin-Key (legacy) and the Authorization Bearer
  // token (Supabase auth). Server accepts either as proof of admin.
  async function adminRequest(path, { method = 'GET', body } = {}) {
    const headers = {};
    const key = getKey();
    const token = readToken();
    if (key) headers['X-Admin-Key'] = key;
    if (token) headers['Authorization'] = 'Bearer ' + token;
    if (body) headers['Content-Type'] = 'application/json';
    try {
      const res = await fetch(path, {
        method,
        headers,
        body: body ? JSON.stringify(body) : undefined
      });
      if (res.status === 404) {
        return { ok: false, error: 'Backend not deployed.', preview: true };
      }
      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        return { ok: false, error: data.error || `Request failed (${res.status})` };
      }
      return { ok: true, ...data };
    } catch {
      return { ok: false, error: 'Network error. Please try again.' };
    }
  }
  const adminFetch = (path) => adminRequest(path);
  const adminPost = (path, body) => adminRequest(path, { method: 'POST', body });

  function renderAuth(error){
    main.innerHTML = `
      <div class="auth-prompt">
        <h2>Admin access</h2>
        <p>${error || 'Enter your admin key to continue.'}</p>
        <input type="password" id="keyInput" class="form-input" placeholder="Admin key" style="margin-bottom:14px" />
        <button class="btn btn-primary btn-block" id="keySubmit">Unlock</button>
      </div>
    `;
    document.getElementById('keySubmit').addEventListener('click', async () => {
      const key = document.getElementById('keyInput').value.trim();
      if (!key) return;
      setKey(key);
      // Test it
      const result = await adminFetch('/api/admin?view=stats');
      if (!result.ok) {
        clearKey();
        renderAuth(result.error || 'Invalid key.');
        return;
      }
      logoutBtn.style.display = '';
      renderDashboard();
    });
    document.getElementById('keyInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('keySubmit').click();
    });
  }

  let activeView = 'orders';

  async function renderDashboard(){
    const stats = await adminFetch('/api/admin?view=stats');
    if (!stats.ok) {
      clearKey();
      renderAuth(stats.error);
      return;
    }
    const s = stats.stats;

    main.innerHTML = `
      <div class="section-marker"><span class="label">Dashboard</span></div>
      <h1 class="page-title">Admin</h1>
      <p class="page-sub">Orders, subscribers, and messages.</p>

      <div class="stats-grid">
        <div class="stat-card"><div class="stat-label">Paid orders</div><div class="stat-value">${s.paid_orders}</div></div>
        <div class="stat-card"><div class="stat-label">Revenue</div><div class="stat-value">$${(s.revenue_cents/100).toFixed(2)}</div></div>
        <div class="stat-card"><div class="stat-label">Subscribers</div><div class="stat-value">${s.active_subscribers}</div></div>
        <div class="stat-card"><div class="stat-label">Unread messages</div><div class="stat-value">${s.unread_messages}</div></div>
      </div>

      <div class="admin-tabs">
        <button class="admin-tab ${activeView==='orders' ? 'active' : ''}" data-view="orders">Orders</button>
        <button class="admin-tab ${activeView==='products' ? 'active' : ''}" data-view="products">Products</button>
        <button class="admin-tab ${activeView==='subscribers' ? 'active' : ''}" data-view="subscribers">Subscribers</button>
        <button class="admin-tab ${activeView==='messages' ? 'active' : ''}" data-view="messages">Messages</button>
        <button class="admin-tab ${activeView==='setup' ? 'active' : ''}" data-view="setup">Setup</button>
      </div>
      <div id="viewContent">Loading…</div>
    `;

    document.querySelectorAll('.admin-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        activeView = tab.dataset.view;
        document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        loadView();
      });
    });

    loadView();
  }

  async function loadView(){
    const target = document.getElementById('viewContent');
    target.innerHTML = '<div style="color:var(--muted);padding:24px" aria-live="polite" aria-busy="true">Loading…</div>';

    if (activeView === 'setup') {
      await renderSetupView(target);
      return;
    }

    const result = await adminFetch(`/api/admin?view=${encodeURIComponent(activeView)}`);
    if (!result.ok) {
      target.innerHTML = '';
      const alert = document.createElement('div');
      alert.className = 'alert alert-error';
      alert.textContent = result.error || 'Could not load data.';
      target.appendChild(alert);
      return;
    }

    if (activeView === 'orders') {
      const STATUSES = ['pending','paid','shipped','delivered','cancelled','refunded'];
      const rows = (result.orders || []).map(o => {
        const safeStatus = STATUSES.includes(o.status) ? o.status : 'pending';
        const itemsHtml = (o.items||[]).map(i => `${escapeHtml(i.name)} ×${escapeHtml(String(i.quantity))}`).join('<br/>');
        const opts = STATUSES.map(s => `<option value="${s}"${s===safeStatus?' selected':''}>${s}</option>`).join('');
        const tracking = o.tracking_number ? escapeHtml(o.tracking_number) : '';
        return `
          <tr data-order-id="${escapeHtml(o.id)}">
            <td class="mono">#${escapeHtml(o.id.slice(0,8).toUpperCase())}</td>
            <td>${escapeHtml(new Date(o.created_at).toLocaleDateString())}</td>
            <td>${escapeHtml(o.email)}</td>
            <td><span class="status-pill ${safeStatus}">${escapeHtml(o.status)}</span></td>
            <td>$${(o.total_cents/100).toFixed(2)}</td>
            <td style="font-size:12px;color:var(--ink-soft)">${itemsHtml}</td>
            <td>
              <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">
                <select class="form-input order-status-select" style="padding:6px 8px;font-size:13px;width:auto;min-width:110px">${opts}</select>
                <input class="form-input order-tracking-input" type="text" placeholder="Tracking #" value="${tracking}" maxlength="40" style="padding:6px 8px;font-size:13px;width:140px" />
                <button type="button" class="btn btn-ghost order-save-btn" style="padding:6px 12px;min-height:32px;font-size:11px">Save</button>
                <button type="button" class="btn btn-ghost order-refund-btn" style="padding:6px 12px;min-height:32px;font-size:11px;border-color:rgba(229,115,115,.4);color:var(--error)" title="Issue Stripe refund for the full order amount">Refund</button>
                <span class="order-save-msg" style="font-size:11px;color:var(--muted)"></span>
              </div>
            </td>
          </tr>
        `;
      }).join('');
      target.innerHTML = `
        <div class="table-actions">
          <button type="button" class="export-btn" data-export="orders" ${!result.orders?.length ? 'disabled' : ''}>Export CSV</button>
        </div>
        <div class="data-table-wrap">
          <table class="data-table">
            <thead><tr><th>Order</th><th>Date</th><th>Email</th><th>Status</th><th>Total</th><th>Items</th><th>Update</th></tr></thead>
            <tbody>${rows || '<tr><td colspan="7" style="padding:32px;text-align:center;color:var(--muted)">No orders yet.</td></tr>'}</tbody>
          </table>
        </div>
      `;
      target.querySelectorAll('tr[data-order-id]').forEach(tr => {
        const id = tr.dataset.orderId;
        const saveBtn = tr.querySelector('.order-save-btn');
        const refundBtn = tr.querySelector('.order-refund-btn');
        const msg = tr.querySelector('.order-save-msg');

        saveBtn.addEventListener('click', async () => {
          const status = tr.querySelector('.order-status-select').value;
          const tracking = tr.querySelector('.order-tracking-input').value.trim();
          if (tracking && !/^[A-Z0-9]{8,40}$/i.test(tracking)) {
            msg.textContent = 'Tracking must be 8–40 letters/numbers.';
            msg.style.color = 'var(--error)';
            return;
          }
          saveBtn.disabled = true;
          msg.textContent = 'Saving…';
          msg.style.color = 'var(--muted)';
          const body = { action: 'update_order', order_id: id, status };
          if (tracking) body.tracking_number = tracking;
          const r = await adminPost('/api/admin', body);
          saveBtn.disabled = false;
          if (r.ok) {
            msg.textContent = 'Saved';
            msg.style.color = 'var(--gold-soft)';
            const pill = tr.querySelector('.status-pill');
            if (pill) { pill.className = 'status-pill ' + status; pill.textContent = status; }
          } else {
            msg.textContent = r.error || 'Failed';
            msg.style.color = 'var(--error)';
          }
        });

        refundBtn.addEventListener('click', async () => {
          if (!confirm('Issue a full Stripe refund for this order? This cannot be undone.')) return;
          refundBtn.disabled = true;
          saveBtn.disabled = true;
          msg.textContent = 'Refunding…';
          msg.style.color = 'var(--muted)';
          const r = await adminPost('/api/admin', { action: 'refund_order', order_id: id });
          refundBtn.disabled = false;
          saveBtn.disabled = false;
          if (r.ok) {
            msg.textContent = 'Refunded';
            msg.style.color = 'var(--gold-soft)';
            const pill = tr.querySelector('.status-pill');
            if (pill) { pill.className = 'status-pill refunded'; pill.textContent = 'refunded'; }
            const sel = tr.querySelector('.order-status-select');
            if (sel) sel.value = 'refunded';
          } else {
            msg.textContent = r.error || 'Refund failed';
            msg.style.color = 'var(--error)';
          }
        });
      });
    }

    if (activeView === 'subscribers') {
      const rows = (result.subscribers || []).map(s => `
        <tr>
          <td>${escapeHtml(s.email)}</td>
          <td>${escapeHtml(s.source||'')}</td>
          <td><span class="status-pill ${s.active?'paid':'cancelled'}">${s.active?'Active':'Unsubscribed'}</span></td>
          <td>${escapeHtml(new Date(s.created_at).toLocaleDateString())}</td>
        </tr>
      `).join('');
      target.innerHTML = `
        <div class="table-actions">
          <button type="button" class="export-btn" data-export="subscribers" ${!result.subscribers?.length ? 'disabled' : ''}>Export CSV</button>
        </div>
        <div class="data-table-wrap">
          <table class="data-table">
            <thead><tr><th>Email</th><th>Source</th><th>Status</th><th>Joined</th></tr></thead>
            <tbody>${rows || '<tr><td colspan="4" style="padding:32px;text-align:center;color:var(--muted)">No subscribers yet.</td></tr>'}</tbody>
          </table>
        </div>
      `;
    }

    if (activeView === 'products') {
      renderProductsView(result.products || [], target);
      return;
    }

    if (activeView === 'messages') {
      const MSTATUSES = ['new','read','replied','archived'];
      const rows = (result.messages || []).map(m => {
        const safeStatus = MSTATUSES.includes(m.status) ? m.status : 'new';
        const truncated = m.message.length > 300 ? m.message.slice(0,300) + '…' : m.message;
        const opts = MSTATUSES.map(s => `<option value="${s}"${s===safeStatus?' selected':''}>${s}</option>`).join('');
        return `
          <tr data-message-id="${escapeHtml(m.id)}">
            <td>${escapeHtml(new Date(m.created_at).toLocaleDateString())}</td>
            <td>${escapeHtml(m.name)}</td>
            <td>${escapeHtml(m.email)}</td>
            <td>${escapeHtml(m.subject||'')}</td>
            <td style="max-width:300px;font-size:12px;color:var(--ink-soft);white-space:pre-wrap">${escapeHtml(truncated)}</td>
            <td><span class="status-pill ${safeStatus}">${escapeHtml(m.status)}</span></td>
            <td>
              <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">
                <select class="form-input message-status-select" style="padding:6px 8px;font-size:13px;width:auto;min-width:100px">${opts}</select>
                <button type="button" class="btn btn-ghost message-save-btn" style="padding:6px 12px;min-height:32px;font-size:11px">Save</button>
                <span class="message-save-msg" style="font-size:11px;color:var(--muted)"></span>
              </div>
            </td>
          </tr>
        `;
      }).join('');
      target.innerHTML = `
        <div class="table-actions">
          <button type="button" class="export-btn" data-export="messages" ${!result.messages?.length ? 'disabled' : ''}>Export CSV</button>
        </div>
        <div class="data-table-wrap">
          <table class="data-table">
            <thead><tr><th>Date</th><th>Name</th><th>Email</th><th>Subject</th><th>Message</th><th>Status</th><th>Update</th></tr></thead>
            <tbody>${rows || '<tr><td colspan="7" style="padding:32px;text-align:center;color:var(--muted)">No messages yet.</td></tr>'}</tbody>
          </table>
        </div>
      `;
      target.querySelectorAll('tr[data-message-id]').forEach(tr => {
        const id = tr.dataset.messageId;
        const btn = tr.querySelector('.message-save-btn');
        const msg = tr.querySelector('.message-save-msg');
        btn.addEventListener('click', async () => {
          const status = tr.querySelector('.message-status-select').value;
          btn.disabled = true;
          msg.textContent = 'Saving…';
          msg.style.color = 'var(--muted)';
          const r = await adminPost('/api/admin', { action: 'update_message', message_id: id, message_status: status });
          btn.disabled = false;
          if (r.ok) {
            msg.textContent = 'Saved';
            msg.style.color = 'var(--gold-soft)';
            const pill = tr.querySelector('.status-pill');
            if (pill) { pill.className = 'status-pill ' + status; pill.textContent = status; }
          } else {
            msg.textContent = r.error || 'Failed';
            msg.style.color = 'var(--error)';
          }
        });
      });
    }

    // Wire any export buttons rendered above
    const exportBtn = target.querySelector('[data-export]');
    if (exportBtn) {
      exportBtn.addEventListener('click', () => {
        if (exportBtn.dataset.export === 'orders') exportCsv('orders', result.orders || []);
        if (exportBtn.dataset.export === 'subscribers') exportCsv('subscribers', result.subscribers || []);
        if (exportBtn.dataset.export === 'messages') exportCsv('messages', result.messages || []);
      });
    }
  }

  // ============ CSV EXPORT ============
  // Builds an RFC 4180-compliant CSV from a row array. We always quote
  // every field — simpler than deciding when to quote and bullet-proof
  // against commas/quotes/newlines hiding inside customer names, messages,
  // or item lists. Internal double-quotes are escaped by doubling.
  function csvField(v) {
    const s = (v == null) ? '' : String(v);
    return '"' + s.replace(/"/g, '""') + '"';
  }
  function buildCsv(headers, rows) {
    const head = headers.map(csvField).join(',');
    const body = rows.map(r => r.map(csvField).join(',')).join('\r\n');
    // BOM so Excel opens UTF-8 correctly without garbling accented characters
    return '﻿' + head + '\r\n' + body + '\r\n';
  }
  function downloadCsv(filename, csv) {
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    setTimeout(() => {
      URL.revokeObjectURL(url);
      a.remove();
    }, 0);
  }
  function exportCsv(kind, rows) {
    const stamp = new Date().toISOString().slice(0, 10);
    if (kind === 'orders') {
      const headers = ['Order ID', 'Created', 'Email', 'Status', 'Subtotal', 'Shipping', 'Total', 'Items', 'Tracking'];
      const data = rows.map(o => [
        o.id,
        new Date(o.created_at).toISOString(),
        o.email,
        o.status,
        ((o.subtotal_cents || 0) / 100).toFixed(2),
        ((o.shipping_cents || 0) / 100).toFixed(2),
        ((o.total_cents || 0) / 100).toFixed(2),
        (o.items || []).map(i => `${i.name}${i.color ? ' / ' + i.color : ''}${i.size ? ' / ' + i.size : ''} x${i.quantity}`).join('; '),
        o.tracking_number || ''
      ]);
      downloadCsv(`tagline-orders-${stamp}.csv`, buildCsv(headers, data));
    }
    if (kind === 'subscribers') {
      const headers = ['Email', 'Source', 'Active', 'Joined'];
      const data = rows.map(s => [
        s.email,
        s.source || '',
        s.active ? 'yes' : 'no',
        new Date(s.created_at).toISOString()
      ]);
      downloadCsv(`tagline-subscribers-${stamp}.csv`, buildCsv(headers, data));
    }
    if (kind === 'messages') {
      const headers = ['Date', 'Name', 'Email', 'Subject', 'Message', 'Status'];
      const data = rows.map(m => [
        new Date(m.created_at).toISOString(),
        m.name,
        m.email,
        m.subject || '',
        m.message || '',
        m.status
      ]);
      downloadCsv(`tagline-messages-${stamp}.csv`, buildCsv(headers, data));
    }
  }

  function escapeHtml(s){
    return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  // ============ SETUP STATUS VIEW ============
  // Shows a checklist of every integration the site uses and what env
  // vars / connectivity tests each one passed or failed. Renders the
  // step-by-step setup hint inline for any incomplete item.
  async function renderSetupView(target) {
    const result = await adminFetch('/api/admin-setup-status');
    if (!result.ok) {
      target.innerHTML = '';
      const alert = document.createElement('div');
      alert.className = 'alert alert-error';
      alert.textContent = result.error || 'Could not load setup status.';
      target.appendChild(alert);
      return;
    }

    const items = result.items || [];
    const requiredOk = result.complete;
    const allOk      = result.all_complete;

    const summaryHtml = allOk
      ? '<div class="setup-banner ok">Everything\'s set up. The site is fully wired and ready for orders.</div>'
      : (requiredOk
          ? '<div class="setup-banner warn">All required integrations are live. Optional items are below — set them up when you\'re ready.</div>'
          : '<div class="setup-banner err">Required integrations are missing. The site can\'t take orders until these are set.</div>');

    const itemsHtml = items.map(it => {
      const statusIcon = it.ok
        ? '<span class="setup-icon ok" aria-label="Done">✓</span>'
        : (it.required
            ? '<span class="setup-icon err" aria-label="Required">!</span>'
            : '<span class="setup-icon warn" aria-label="Optional">○</span>');
      const liveLine = it.live ? renderLiveLine(it.live) : '';
      const missingLine = it.missing && it.missing.length
        ? `<div class="setup-missing">Missing: <code>${it.missing.map(escapeHtml).join('</code>, <code>')}</code></div>`
        : '';
      const docsLink = it.docs_url
        ? `<a class="setup-docs" href="${escapeHtml(it.docs_url)}" target="_blank" rel="noopener">Open dashboard ↗</a>`
        : '';
      const hintHtml = it.ok
        ? `<div class="setup-hint ok">${escapeHtml(it.hint)}</div>`
        : `<div class="setup-hint">${escapeHtml(it.hint).replace(/\n/g, '<br>')}</div>`;
      return `
        <div class="setup-item ${it.ok ? 'ok' : (it.required ? 'err' : 'warn')}">
          <div class="setup-head">
            ${statusIcon}
            <div class="setup-name">${escapeHtml(it.name)}${it.required ? ' <span class="setup-req">required</span>' : ''}</div>
          </div>
          ${liveLine}
          ${missingLine}
          ${hintHtml}
          ${docsLink}
        </div>
      `;
    }).join('');

    target.innerHTML = `
      <div class="setup-wrap">
        ${summaryHtml}
        ${itemsHtml}
        <button type="button" class="export-btn" id="setupRefresh" style="margin-top:14px">Refresh status</button>
      </div>
    `;
    document.getElementById('setupRefresh').addEventListener('click', () => loadView());
  }

  function renderLiveLine(live) {
    if (live.connected) {
      const mode = live.mode ? ` (<span class="mono">${escapeHtml(live.mode)}</span>)` : '';
      return `<div class="setup-live ok">Live connection works${mode}</div>`;
    }
    if (live.error) {
      return `<div class="setup-live err">Live test failed: ${escapeHtml(live.error)}</div>`;
    }
    return '';
  }

  // ============ PRODUCT EDITOR VIEW ============
  // Lists all products with thumbnail + name + price + stock + active
  // status. Click any row to expand an edit form. Save sends a PATCH
  // (action=update_product) to /api/admin and refreshes that one row.
  function renderProductsView(products, target) {
    if (!products.length) {
      target.innerHTML = '<div style="padding:32px;text-align:center;color:var(--muted)">No products yet.</div>';
      return;
    }
    // Group by category for visual organization
    const byCat = {};
    products.forEach(p => {
      const cat = p.category || 'Uncategorized';
      if (!byCat[cat]) byCat[cat] = [];
      byCat[cat].push(p);
    });
    // Build HTML
    target.innerHTML = `
      <div class="table-actions" style="margin-bottom:18px">
        <span style="font-size:12px;color:var(--muted);align-self:center">${products.length} product${products.length === 1 ? '' : 's'}. Click any row to edit.</span>
      </div>
      <div id="peList"></div>
    `;
    const list = document.getElementById('peList');
    // Render each category as a header + its rows
    Object.keys(byCat).sort().forEach(cat => {
      const header = document.createElement('div');
      header.style.cssText = 'font-size:11px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin:18px 0 10px;padding-bottom:8px;border-bottom:1px solid var(--line)';
      header.textContent = cat;
      list.appendChild(header);
      byCat[cat].forEach(p => list.appendChild(buildProductRow(p)));
    });
  }

  function buildProductRow(p) {
    const row = document.createElement('div');
    row.className = 'pe-row';
    row.dataset.productId = p.id;

    // Summary (clickable to expand)
    const summary = document.createElement('div');
    summary.className = 'pe-summary';

    const thumb = document.createElement('div');
    thumb.className = 'pe-thumb';
    if (p.image_url) {
      const img = document.createElement('img');
      img.src = p.image_url;
      img.alt = p.name || '';
      img.loading = 'lazy';
      img.onerror = () => { thumb.removeChild(img); thumb.textContent = (p.name||'').charAt(0).toUpperCase(); };
      thumb.appendChild(img);
    } else {
      thumb.textContent = (p.name||'').charAt(0).toUpperCase();
    }

    const info = document.createElement('div');
    const nameEl = document.createElement('div');
    nameEl.className = 'pe-name';
    nameEl.textContent = p.name;
    const metaEl = document.createElement('div');
    metaEl.className = 'pe-meta';
    metaEl.textContent = (p.color || '') + (p.tag ? ' · ' + p.tag : '');
    info.appendChild(nameEl);
    info.appendChild(metaEl);

    const price = document.createElement('div');
    price.className = 'pe-price';
    price.textContent = '$' + (p.price_cents / 100).toFixed(2);

    const stock = document.createElement('div');
    stock.className = 'pe-stock-cell';
    stock.textContent = p.stock + ' in stock';

    const active = document.createElement('div');
    active.className = 'pe-active-cell';
    const pill = document.createElement('span');
    pill.className = p.active ? 'pill-yes' : 'pill-no';
    pill.textContent = p.active ? 'Live' : 'Hidden';
    active.appendChild(pill);

    summary.appendChild(thumb);
    summary.appendChild(info);
    summary.appendChild(price);
    summary.appendChild(stock);
    summary.appendChild(active);
    row.appendChild(summary);

    // Edit form (lazy — built on first expand)
    const form = document.createElement('div');
    form.className = 'pe-form';
    row.appendChild(form);

    summary.addEventListener('click', () => {
      const opening = !row.classList.contains('editing');
      if (opening && !form.dataset.built) {
        buildEditForm(form, p);
        form.dataset.built = '1';
      }
      row.classList.toggle('editing');
    });

    return row;
  }

  function buildEditForm(form, p) {
    // Use innerHTML once to construct the form's structure with placeholder
    // values. Field values are set via .value (XSS-safe even with weird
    // strings) right after.
    form.innerHTML = `
      <div class="pe-grid">
        <div>
          <label for="pe-name-${p.id}">Name</label>
          <input id="pe-name-${p.id}" type="text" maxlength="200" />
        </div>
        <div>
          <label for="pe-color-${p.id}">Color</label>
          <input id="pe-color-${p.id}" type="text" maxlength="50" placeholder="(none)" />
        </div>
      </div>
      <div class="pe-grid">
        <div>
          <label for="pe-price-${p.id}">Price ($)</label>
          <input id="pe-price-${p.id}" type="number" min="0" step="0.01" />
        </div>
        <div>
          <label for="pe-stock-${p.id}">Stock</label>
          <input id="pe-stock-${p.id}" type="number" min="0" step="1" />
        </div>
      </div>
      <div class="pe-grid">
        <div>
          <label for="pe-cat-${p.id}">Category</label>
          <select id="pe-cat-${p.id}">
            <option>Tops</option>
            <option>Bottoms</option>
            <option>Outerwear</option>
            <option>Footwear</option>
            <option>Accessories</option>
            <option>Uncategorized</option>
          </select>
        </div>
        <div>
          <label for="pe-tag-${p.id}">Tag</label>
          <select id="pe-tag-${p.id}">
            <option value="">(none)</option>
            <option>New</option>
            <option>Featured</option>
            <option>Limited</option>
            <option>Restock</option>
            <option>Sold Out</option>
          </select>
        </div>
      </div>
      <div>
        <label for="pe-image-${p.id}">Product photo</label>
        <input id="pe-image-${p.id}" type="url" maxlength="1000" placeholder="https://..." />
        <div class="pe-upload-row">
          <button type="button" class="pe-upload-btn" data-upload-trigger="${p.id}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 4v16M4 12h16"/></svg>
            Upload + crop photo
          </button>
          <input type="file" accept="image/jpeg,image/png,image/webp,image/heic,image/heif" id="pe-file-${p.id}" hidden />
          <span class="pe-upload-status" id="pe-upstatus-${p.id}"></span>
        </div>
        <div class="pe-help">Take a photo or pick from gallery. We'll crop it to a square so all product cards line up.</div>
        <div id="pe-imgprev-${p.id}" class="pe-imgprev" hidden></div>
      </div>
      <div style="margin-top:14px">
        <label for="pe-desc-${p.id}">Description</label>
        <textarea id="pe-desc-${p.id}" maxlength="2000" rows="3"></textarea>
      </div>
      <div style="margin-top:14px;display:flex;align-items:center;gap:10px">
        <label style="margin-bottom:0;letter-spacing:0;text-transform:none;font-size:13px;color:var(--ink)">
          <input id="pe-active-${p.id}" type="checkbox" style="width:auto;margin-right:8px;vertical-align:middle"/>
          Live on the site
        </label>
      </div>
      <div class="pe-actions">
        <button type="button" class="pe-btn" data-action="cancel">Cancel</button>
        <button type="button" class="pe-btn primary" data-action="save">Save changes</button>
      </div>
      <div class="pe-status" data-status></div>
    `;

    // Populate field values (XSS-safe via .value)
    form.querySelector('#pe-name-' + p.id).value = p.name || '';
    form.querySelector('#pe-color-' + p.id).value = p.color || '';
    form.querySelector('#pe-price-' + p.id).value = (p.price_cents / 100).toFixed(2);
    form.querySelector('#pe-stock-' + p.id).value = p.stock;
    form.querySelector('#pe-cat-' + p.id).value = p.category || 'Uncategorized';
    form.querySelector('#pe-tag-' + p.id).value = p.tag || '';
    form.querySelector('#pe-image-' + p.id).value = p.image_url || '';
    form.querySelector('#pe-desc-' + p.id).value = p.description || '';
    form.querySelector('#pe-active-' + p.id).checked = !!p.active;

    // Wire actions
    form.querySelector('[data-action="cancel"]').addEventListener('click', () => {
      const row = form.closest('.pe-row');
      row.classList.remove('editing');
    });
    form.querySelector('[data-action="save"]').addEventListener('click', () => {
      saveProductEdit(form, p);
    });

    // Live image preview — debounced so we don't spam fetches as user types
    const imageInput = form.querySelector('#pe-image-' + p.id);
    const previewBox = form.querySelector('#pe-imgprev-' + p.id);
    let previewTimer = null;
    function updatePreview() {
      clearTimeout(previewTimer);
      previewTimer = setTimeout(() => {
        const url = imageInput.value.trim();
        previewBox.innerHTML = '';
        if (!url) {
          previewBox.hidden = true;
          return;
        }
        if (!/^https?:\/\//i.test(url)) {
          previewBox.hidden = false;
          previewBox.innerHTML = '<div class="err">URL must start with http:// or https://</div>';
          return;
        }
        previewBox.hidden = false;
        const img = document.createElement('img');
        img.src = url;
        img.alt = 'preview';
        img.loading = 'lazy';
        img.onerror = () => {
          previewBox.innerHTML = '<div class="err">Couldn\'t load that image. Check the URL.</div>';
        };
        previewBox.appendChild(img);
      }, 400);
    }
    imageInput.addEventListener('input', updatePreview);
    // Show the existing image immediately when the form opens
    if (imageInput.value.trim()) updatePreview();
  }

  async function saveProductEdit(form, p) {
    const status = form.querySelector('[data-status]');
    status.classList.remove('error');
    status.textContent = 'Saving…';
    const saveBtn = form.querySelector('[data-action="save"]');
    saveBtn.disabled = true;

    // Read + validate
    const v = (id) => form.querySelector('#pe-' + id + '-' + p.id);
    const name = v('name').value.trim();
    const color = v('color').value.trim();
    const priceDollars = parseFloat(v('price').value);
    const stock = parseInt(v('stock').value, 10);
    const category = v('cat').value;
    const tag = v('tag').value;
    const image_url = v('image').value.trim();
    const description = v('desc').value;
    const active = v('active').checked;

    if (!name) { status.textContent = 'Name is required'; status.classList.add('error'); saveBtn.disabled = false; return; }
    if (!Number.isFinite(priceDollars) || priceDollars < 0) { status.textContent = 'Invalid price'; status.classList.add('error'); saveBtn.disabled = false; return; }
    if (!Number.isInteger(stock) || stock < 0) { status.textContent = 'Invalid stock'; status.classList.add('error'); saveBtn.disabled = false; return; }
    if (image_url && !/^https?:\/\//i.test(image_url)) { status.textContent = 'Image URL must start with http:// or https://'; status.classList.add('error'); saveBtn.disabled = false; return; }

    const result = await adminPost('/api/admin', {
      action: 'update_product',
      product_id: p.id,
      name,
      color: color || null,
      price_cents: Math.round(priceDollars * 100),
      stock,
      category,
      tag: tag || null,
      image_url: image_url || null,
      description: description || null,
      active
    });

    if (!result.ok) {
      status.textContent = result.error || 'Could not save.';
      status.classList.add('error');
      saveBtn.disabled = false;
      return;
    }
    status.textContent = 'Saved ✓';
    saveBtn.disabled = false;
    // Refresh the whole products view after a brief delay so the user
    // sees the success state, then sees their change reflected.
    setTimeout(() => loadView(), 800);
  }

  logoutBtn.addEventListener('click', () => {
    clearKey();
    logoutBtn.style.display = 'none';
    renderAuth();
  });

  // Boot — check preview mode first
  async function boot() {
    // Quick check: hit /api/products to see if backend exists
    try {
      const test = await fetch('/api/admin?view=stats', { headers: { 'X-Admin-Key': 'preview-mode-check' } });
      if (test.status === 404) {
        showPreviewMode();
        return;
      }
    } catch {
      showPreviewMode();
      return;
    }

    // Auth precedence:
    //  1. ADMIN_API_KEY in localStorage  → use the key
    //  2. Signed-in user with profiles.is_admin = true  → use the JWT
    //  3. Otherwise → show the key prompt
    // We test (2) by hitting /api/admin?view=stats; if it returns 200
    // with just the Authorization Bearer token (no key), the user is
    // a verified admin and we skip the prompt.
    if (getKey()) {
      logoutBtn.style.display = '';
      renderDashboard();
      return;
    }
    const token = readToken();
    if (token) {
      const probe = await adminRequest('/api/admin?view=stats');
      if (probe.ok) {
        logoutBtn.style.display = '';
        renderDashboard();
        return;
      }
    }
    renderAuth();
  }

  function showPreviewMode() {
    main.innerHTML = `
      <div class="auth-prompt">
        <div style="width:42px;height:42px;margin:0 auto 24px;color:var(--gold);opacity:.7">
          <svg viewBox="0 0 200 340" fill="currentColor"><path d="M88 0 L112 0 L112 100 L180 100 L180 128 L112 128 L112 340 L88 340 L88 128 L20 128 L20 100 L88 100 Z"/></svg>
        </div>
        <h2>Admin coming soon.</h2>
        <p>The admin dashboard activates once the backend is connected. For now, this is preview mode.</p>
        <a href="/" class="btn btn-primary btn-block" style="margin-top:8px">Back to site</a>
      </div>
    `;
  }

  boot();
})();
</script>

<!-- ============ PHOTO UPLOAD + CROP ============ -->
<!-- Modal lives at body level so it can fully overlay the admin UI.
     One modal, reused for every product upload (state captured per-open). -->
<div id="cropModal" class="crop-modal" hidden role="dialog" aria-modal="true" aria-label="Crop photo">
  <div class="crop-stage" id="cropStage">
    <img id="cropImage" alt="" />
    <div class="crop-frame" id="cropFrame"></div>
  </div>
  <div class="crop-controls">
    <p class="crop-hint">Drag the gold box to choose what shows on the product card.<br/>The result will be square — fits every layout.</p>
    <div class="crop-buttons">
      <button type="button" class="crop-btn" id="cropCancel">Cancel</button>
      <button type="button" class="crop-btn primary" id="cropConfirm">Use this photo</button>
    </div>
  </div>
</div>

<script>
(function(){
  'use strict';

  // Hijack the .pe-upload-btn click → open file picker; on file selected,
  // open the crop modal; on confirm, POST cropped image to /api/admin-upload
  // and stuff the resulting URL back into the matching pe-image-<id> input.

  const modal       = document.getElementById('cropModal');
  const cropImage   = document.getElementById('cropImage');
  const cropFrame   = document.getElementById('cropFrame');
  const cropStage   = document.getElementById('cropStage');
  const cropCancel  = document.getElementById('cropCancel');
  const cropConfirm = document.getElementById('cropConfirm');

  let activeProductId = null;       // which product row this upload is for
  let activeStatusEl = null;        // status text element near the upload button
  let activeImageInput = null;      // the pe-image-<id> input to fill on success

  // Drag state for the crop frame
  let drag = null;

  // Read the admin key (sessionStorage — see migrateAdminKey above) or
  // the Supabase auth token (admins who are signed in as a profile with
  // is_admin=true). Either auth path is accepted by /api/admin-upload.
  function getAdminKey() {
    try { return sessionStorage.getItem('tagline_admin_key') || ''; } catch { return ''; }
  }
  function getAuthToken() {
    try {
      // Token may be in either storage depending on the user's "Remember me"
      // choice at sign-in. Match the JWT format defensively.
      const t = localStorage.getItem('tagline_token') || sessionStorage.getItem('tagline_token') || '';
      return /^[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+$/.test(t) ? t : '';
    } catch { return ''; }
  }

  // Delegate clicks: any .pe-upload-btn → trigger the matching <input type="file">
  document.addEventListener('click', (e) => {
    const btn = e.target.closest('[data-upload-trigger]');
    if (!btn) return;
    const productId = btn.dataset.uploadTrigger;
    const fileInput = document.getElementById('pe-file-' + productId);
    if (!fileInput) return;
    activeProductId  = productId;
    activeStatusEl   = document.getElementById('pe-upstatus-' + productId);
    activeImageInput = document.getElementById('pe-image-' + productId);
    fileInput.value = '';
    fileInput.click();
  });

  // Delegate file selection: any pe-file-<id> input change → open crop modal
  document.addEventListener('change', (e) => {
    const input = e.target;
    if (!input.matches || !input.matches('input[type="file"][id^="pe-file-"]')) return;
    const file = input.files && input.files[0];
    if (!file) return;
    if (!/^image\//i.test(file.type)) {
      setStatus('Pick an image file.', true);
      return;
    }
    if (file.size > 12 * 1024 * 1024) {
      setStatus('Image too large — keep under 12 MB.', true);
      return;
    }
    setStatus('Loading…', false);
    const reader = new FileReader();
    reader.onload = () => openCropModal(reader.result);
    reader.onerror = () => setStatus('Could not read that file.', true);
    reader.readAsDataURL(file);
  });

  function setStatus(msg, isError) {
    if (!activeStatusEl) return;
    activeStatusEl.textContent = msg;
    activeStatusEl.style.color = isError ? 'var(--error)' : 'var(--ink-soft)';
  }

  function openCropModal(dataUrl) {
    cropImage.onload = () => {
      // Fit frame: 70% of the smaller image dimension, centered
      requestAnimationFrame(() => {
        const stageRect = cropStage.getBoundingClientRect();
        const imgRect   = cropImage.getBoundingClientRect();
        const min = Math.min(imgRect.width, imgRect.height);
        const size = Math.floor(min * 0.7);
        cropFrame.style.width  = size + 'px';
        cropFrame.style.height = size + 'px';
        // Center within stage (the image is centered in stage by flex)
        const offsetLeft = (stageRect.width  - size) / 2;
        const offsetTop  = (stageRect.height - size) / 2;
        cropFrame.style.left = offsetLeft + 'px';
        cropFrame.style.top  = offsetTop  + 'px';
      });
      modal.removeAttribute('hidden');
      setStatus('', false);
    };
    cropImage.onerror = () => {
      setStatus('That format is not supported in this browser. Try JPEG or PNG.', true);
    };
    cropImage.src = dataUrl;
  }

  function closeCropModal() {
    modal.setAttribute('hidden', '');
    cropImage.removeAttribute('src');
    cropConfirm.disabled = false;
    cropConfirm.textContent = 'Use this photo';
  }

  cropCancel.addEventListener('click', () => {
    closeCropModal();
    setStatus('', false);
  });

  // ===== DRAG TO REPOSITION CROP FRAME =====
  cropFrame.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    const stageRect = cropStage.getBoundingClientRect();
    const imgRect   = cropImage.getBoundingClientRect();
    drag = {
      startX: e.clientX,
      startY: e.clientY,
      origLeft: parseFloat(cropFrame.style.left) || 0,
      origTop:  parseFloat(cropFrame.style.top)  || 0,
      // Constrain frame to stay within the IMAGE bounds (not the stage)
      minLeft: imgRect.left - stageRect.left,
      minTop:  imgRect.top  - stageRect.top,
      maxLeft: imgRect.left - stageRect.left + imgRect.width  - cropFrame.offsetWidth,
      maxTop:  imgRect.top  - stageRect.top  + imgRect.height - cropFrame.offsetHeight
    };
    cropFrame.setPointerCapture(e.pointerId);
  });

  cropFrame.addEventListener('pointermove', (e) => {
    if (!drag) return;
    let nl = drag.origLeft + (e.clientX - drag.startX);
    let nt = drag.origTop  + (e.clientY - drag.startY);
    nl = Math.max(drag.minLeft, Math.min(nl, drag.maxLeft));
    nt = Math.max(drag.minTop,  Math.min(nt, drag.maxTop));
    cropFrame.style.left = nl + 'px';
    cropFrame.style.top  = nt + 'px';
  });

  function endDrag() { drag = null; }
  cropFrame.addEventListener('pointerup', endDrag);
  cropFrame.addEventListener('pointercancel', endDrag);

  // ===== CONFIRM: CROP TO 1000x1000 → POST → FILL URL =====
  cropConfirm.addEventListener('click', async () => {
    cropConfirm.disabled = true;
    cropConfirm.textContent = 'Uploading…';

    try {
      // Compute crop coords in original-image pixel space
      const imgBox   = cropImage.getBoundingClientRect();
      const frameBox = cropFrame.getBoundingClientRect();
      const scaleX = cropImage.naturalWidth  / cropImage.offsetWidth;
      const scaleY = cropImage.naturalHeight / cropImage.offsetHeight;
      const sx = Math.max(0, (frameBox.left - imgBox.left) * scaleX);
      const sy = Math.max(0, (frameBox.top  - imgBox.top)  * scaleY);
      const sw = frameBox.width  * scaleX;
      const sh = frameBox.height * scaleY;

      const canvas = document.createElement('canvas');
      canvas.width = 1000;
      canvas.height = 1000;
      const ctx = canvas.getContext('2d');
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = 'high';
      // Match-color background in case the source has alpha
      ctx.fillStyle = '#f3eee4';
      ctx.fillRect(0, 0, 1000, 1000);
      ctx.drawImage(cropImage, sx, sy, sw, sh, 0, 0, 1000, 1000);
      const dataUrl = canvas.toDataURL('image/jpeg', 0.85);

      const headers = { 'Content-Type': 'application/json' };
      const key = getAdminKey();
      const token = getAuthToken();
      if (key) headers['X-Admin-Key'] = key;
      if (token) headers['Authorization'] = 'Bearer ' + token;
      const res = await fetch('/api/admin-upload', {
        method: 'POST',
        headers,
        body: JSON.stringify({
          product_id: activeProductId,
          data_url: dataUrl
        })
      });
      const json = await res.json();
      if (!res.ok || !json.ok) {
        throw new Error(json.error || ('Upload failed (' + res.status + ')'));
      }
      // Fill the URL input — also fire 'input' so any preview updates
      if (activeImageInput) {
        activeImageInput.value = json.url;
        activeImageInput.dispatchEvent(new Event('input', { bubbles: true }));
      }
      setStatus('Photo uploaded. Click "Save changes" to publish.', false);
      closeCropModal();
    } catch (err) {
      console.error('[admin upload]', err);
      cropConfirm.disabled = false;
      cropConfirm.textContent = 'Use this photo';
      setStatus(err.message || 'Upload failed.', true);
    }
  });

  // Esc to cancel
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && !modal.hasAttribute('hidden')) {
      closeCropModal();
    }
  });
})();
</script>

</body>
</html>
