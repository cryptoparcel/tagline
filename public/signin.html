<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#08080a" />
<meta name="color-scheme" content="dark" />
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%2308080a'/%3E%3Cpath d='M14 4 L18 4 L18 14 L28 14 L28 18 L18 18 L18 28 L14 28 L14 18 L4 18 L4 14 L14 14 Z' fill='%23d4a558'/%3E%3C/svg%3E" />
<title>Sign in — TAGLINE</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/styles.css" />

<style>
  .auth-tabs{
    display:flex;border-bottom:1px solid var(--line);margin-bottom:32px;
  }
  .auth-tab{
    flex:1;
    padding:14px 0;
    background:transparent;
    color:var(--muted);
    font-size:13px;font-weight:600;
    letter-spacing:.08em;text-transform:uppercase;
    border-bottom:2px solid transparent;
    transition:color .2s,border-color .2s;
  }
  .auth-tab.active{
    color:var(--ink);
    border-bottom-color:var(--gold);
  }
  .auth-form{display:none}
  .auth-form.active{display:block}
  .auth-foot{
    margin-top:24px;text-align:center;
    color:var(--muted);font-size:13px;
  }
  .auth-foot a{color:var(--gold-soft)}
</style>
</head>
<body>

<header class="nav">
  <a href="/" class="logo">TAGLINE</a>
  <div class="nav-links">
    <a href="/" class="nav-link hide-mobile">Home</a>
    <a href="/cart" class="cart-icon-btn" aria-label="Cart">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M5 7h14l-1.5 12a2 2 0 0 1-2 1.8h-7a2 2 0 0 1-2-1.8L5 7z"/><path d="M9 7V5a3 3 0 0 1 6 0v2"/></svg>
      <span class="cart-badge" data-cart-count style="display:none">0</span>
    </a>
  </div>
</header>

<main class="page-narrow">
  <div style="text-align:center;margin-bottom:36px">
    <div class="section-marker" style="justify-content:center"><span class="label">Account</span></div>
    <h1 class="page-title">Welcome.</h1>
  </div>

  <div class="card">
    <div class="auth-tabs">
      <button type="button" class="auth-tab active" data-tab="signin">Sign in</button>
      <button type="button" class="auth-tab" data-tab="signup">Sign up</button>
    </div>

    <div id="alertContainer" role="alert" aria-live="polite" aria-atomic="true"></div>

    <!-- Sign in form -->
    <form class="auth-form active" id="signinForm">
      <div class="form-group">
        <label class="form-label" for="signinEmail">Email</label>
        <input class="form-input" type="email" id="signinEmail" name="email" required autocomplete="email" />
      </div>
      <div class="form-group">
        <label class="form-label" for="signinPassword">Password</label>
        <input class="form-input" type="password" id="signinPassword" name="password" required autocomplete="current-password" minlength="6" />
      </div>
      <button type="submit" class="btn btn-primary btn-block">Sign in</button>
    </form>

    <!-- Sign up form -->
    <form class="auth-form" id="signupForm">
      <div class="form-group">
        <label class="form-label" for="signupName">Name</label>
        <input class="form-input" type="text" id="signupName" name="name" required autocomplete="name" />
      </div>
      <div class="form-group">
        <label class="form-label" for="signupEmail">Email</label>
        <input class="form-input" type="email" id="signupEmail" name="email" required autocomplete="email" />
      </div>
      <div class="form-group">
        <label class="form-label" for="signupPassword">Password (8+ characters)</label>
        <input class="form-input" type="password" id="signupPassword" name="password" required autocomplete="new-password" minlength="8" />
      </div>
      <button type="submit" class="btn btn-primary btn-block">Create account</button>
    </form>
  </div>

  <p class="auth-foot">
    By continuing you agree to receive emails about your orders.
  </p>
</main>

<footer>
  <span>© 2026 TAGLINE</span>
  <a href="/contact">Contact</a>
</footer>

<script src="/tagline-app.js" defer></script>
<script>
(function(){
  // Check if we're in preview mode (no Supabase keys configured)
  if (window.SUPABASE_URL && window.SUPABASE_URL.indexOf('REPLACE_WITH') === 0) {
    // Show preview mode UI instead of forms
    document.querySelector('.card').innerHTML = `
      <div style="padding:48px 24px;text-align:center">
        <div style="width:48px;height:48px;margin:0 auto 24px;color:var(--gold);opacity:.7">
          <svg viewBox="0 0 200 340" fill="currentColor"><path d="M88 0 L112 0 L112 100 L180 100 L180 128 L112 128 L112 340 L88 340 L88 128 L20 128 L20 100 L88 100 Z"/></svg>
        </div>
        <h2 style="font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:600;letter-spacing:-0.02em;color:var(--ink);margin-bottom:14px">Accounts coming soon.</h2>
        <p style="color:var(--ink-soft);font-size:14px;margin-bottom:32px;line-height:1.6;max-width:340px;margin-left:auto;margin-right:auto">
          Sign in and order tracking activate at launch. For now, browse the collection or get in touch.
        </p>
        <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
          <a href="/" class="btn btn-primary">Browse the collection</a>
          <a href="/contact" class="btn btn-ghost">Contact us</a>
        </div>
      </div>
    `;
    return;
  }

  // Tab switching
  document.querySelectorAll('.auth-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
      tab.classList.add('active');
      const target = tab.dataset.tab;
      document.getElementById(target + 'Form').classList.add('active');
      document.getElementById('alertContainer').innerHTML = '';
    });
  });

  function showAlert(message, type = 'error') {
    const container = document.getElementById('alertContainer');
    container.innerHTML = '';
    const div = document.createElement('div');
    div.className = 'alert alert-' + (type === 'success' ? 'success' : 'error');
    div.textContent = message; // textContent prevents any HTML injection
    container.appendChild(div);
  }

  // Sign in
  document.getElementById('signinForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('signinEmail').value.trim();
    const password = document.getElementById('signinPassword').value;
    const btn = e.target.querySelector('button[type="submit"]');
    btn.disabled = true;
    btn.textContent = 'Signing in…';

    try {
      const url = window.SUPABASE_URL + '/auth/v1/token?grant_type=password';
      const res = await fetch(url, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': window.SUPABASE_ANON_KEY
        },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (!res.ok) {
        showAlert(data.error_description || data.msg || 'Sign in failed.');
        btn.disabled = false;
        btn.textContent = 'Sign in';
        return;
      }
      window.Tagline.Auth.setSession(data.access_token, data.user);
      window.location.href = '/account';
    } catch (err) {
      showAlert('Network error. Please try again.');
      btn.disabled = false;
      btn.textContent = 'Sign in';
    }
  });

  // Sign up
  document.getElementById('signupForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const name = document.getElementById('signupName').value.trim();
    const email = document.getElementById('signupEmail').value.trim();
    const password = document.getElementById('signupPassword').value;
    const btn = e.target.querySelector('button[type="submit"]');
    btn.disabled = true;
    btn.textContent = 'Creating account…';

    try {
      const url = window.SUPABASE_URL + '/auth/v1/signup';
      const res = await fetch(url, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': window.SUPABASE_ANON_KEY
        },
        body: JSON.stringify({
          email, password,
          data: { full_name: name }
        })
      });
      const data = await res.json();
      if (!res.ok) {
        showAlert(data.error_description || data.msg || 'Sign up failed.');
        btn.disabled = false;
        btn.textContent = 'Create account';
        return;
      }
      if (data.access_token) {
        window.Tagline.Auth.setSession(data.access_token, data.user);
        window.location.href = '/account';
      } else {
        showAlert('Check your email to confirm your account, then sign in.', 'success');
        btn.disabled = false;
        btn.textContent = 'Create account';
      }
    } catch (err) {
      showAlert('Network error. Please try again.');
      btn.disabled = false;
      btn.textContent = 'Create account';
    }
  });

  // Redirect away if already logged in
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', () => {
      if (window.Tagline.Auth.isLoggedIn()) {
        window.location.href = '/account';
      }
    });
  } else if (window.Tagline?.Auth?.isLoggedIn()) {
    window.location.href = '/account';
  }
})();
</script>

<!-- Public Supabase keys (safe to expose) - replace with real values -->
<script>
  window.SUPABASE_URL = 'REPLACE_WITH_PUBLIC_SUPABASE_URL';
  window.SUPABASE_ANON_KEY = 'REPLACE_WITH_PUBLIC_SUPABASE_ANON_KEY';
</script>

</body>
</html>
