<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#08080a" />
<meta name="color-scheme" content="dark" />
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%2308080a'/%3E%3Cpath d='M14 4 L18 4 L18 14 L28 14 L28 18 L18 18 L18 28 L14 28 L14 18 L4 18 L4 14 L14 14 Z' fill='%23d4a558'/%3E%3C/svg%3E" />
<title>Cart — TAGLINE</title>
<meta name="description" content="Your TAGLINE shopping cart." />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/styles.css" />

<style>
  .cart-layout{
    display:grid;
    grid-template-columns:1fr 360px;
    gap:48px;
    align-items:start;
  }
  @media (max-width:880px){
    .cart-layout{grid-template-columns:1fr;gap:24px}
  }

  .cart-items{
    display:flex;flex-direction:column;gap:1px;
    background:var(--line);
    border:1px solid var(--line);
  }
  .cart-item{
    background:var(--surface);
    padding:20px;
    display:grid;
    grid-template-columns:80px 1fr auto;
    gap:18px;
    align-items:center;
  }
  @media (max-width:520px){
    .cart-item{grid-template-columns:64px 1fr;gap:14px}
    .cart-item-price{grid-column:2;text-align:right;margin-top:8px}
  }
  .cart-item-thumb{
    width:80px;height:80px;
    background:linear-gradient(160deg,#1a1814 0%,#0d0c0a 100%);
    border:1px solid var(--line);
    display:grid;place-items:center;
    color:var(--ink-soft);
    font-family:'Space Grotesk',sans-serif;
    font-weight:600;
    font-size:20px;
  }
  @media (max-width:520px){
    .cart-item-thumb{width:64px;height:64px;font-size:16px}
  }
  .cart-item-info .name{
    font-size:14px;font-weight:600;
    letter-spacing:0;
    margin-bottom:4px;
  }
  .cart-item-info .color{
    font-size:12px;color:var(--muted);
    margin-bottom:12px;
  }
  .qty-control{
    display:inline-flex;align-items:center;
    border:1px solid var(--line-strong);
  }
  .qty-btn{
    width:32px;height:32px;
    display:grid;place-items:center;
    color:var(--ink-soft);
    transition:color .2s,background .2s;
  }
  .qty-btn:hover{color:var(--ink);background:rgba(255,255,250,.04)}
  .qty-display{
    width:36px;text-align:center;
    font-size:13px;font-weight:600;
    color:var(--ink);
  }
  .remove-btn{
    background:transparent;color:var(--muted);
    font-size:11px;letter-spacing:.08em;text-transform:uppercase;
    padding:8px 0;
    margin-left:14px;
    transition:color .2s;
  }
  .remove-btn:hover{color:var(--error)}
  .cart-item-price{
    font-size:14px;font-weight:600;
    color:var(--ink);
    text-align:right;
  }

  .cart-summary{
    background:linear-gradient(160deg,#14110c 0%,#0d0c0a 100%);
    border:1px solid var(--line);
    padding:28px;
    position:sticky;top:96px;
  }
  .summary-row{
    display:flex;justify-content:space-between;
    padding:10px 0;
    font-size:14px;
    color:var(--ink-soft);
  }
  .summary-row.total{
    border-top:1px solid var(--line);
    padding-top:18px;margin-top:14px;
    font-weight:600;color:var(--ink);font-size:17px;
  }
  .summary-row .label{color:var(--ink-soft)}
  .summary-row .value{color:var(--ink);font-weight:500}
  .summary-shipping-note{
    font-size:12px;color:var(--gold-soft);
    margin-top:8px;
    padding:10px 14px;
    background:rgba(184,137,61,.08);
    border:1px solid rgba(184,137,61,.2);
  }

  /* ============ LOADING SKELETON ============
     Shown while we wait for tagline-app.js (and therefore Tagline.PRODUCTS)
     to finish loading. Matches the grid-vs-summary layout the cart will
     use, so there's no jump-in when the real content arrives. */
  .cart-skeleton{
    display:grid;
    grid-template-columns:1fr 360px;
    gap:48px;
    align-items:start;
  }
  @media (max-width:880px){
    .cart-skeleton{grid-template-columns:1fr;gap:24px}
  }
  .cs-items{ display:flex; flex-direction:column; gap:1px; background:var(--line); border:1px solid var(--line); }
  .cs-item{
    background:var(--surface);
    height:120px; padding:20px;
    display:flex; align-items:center; gap:18px;
    position:relative; overflow:hidden;
  }
  .cs-thumb{ width:80px; height:80px; background:rgba(255,255,250,.04); }
  .cs-line{ background:rgba(255,255,250,.04); height:14px; border-radius:2px; }
  .cs-line.short{ width:40%; }
  .cs-line.med{ width:65%; }
  .cs-summary{
    background:linear-gradient(160deg,#14110c 0%,#0d0c0a 100%);
    border:1px solid var(--line);
    padding:28px;
    height:280px;
    position:relative; overflow:hidden;
  }
  .cs-item::after, .cs-summary::after{
    content:'';
    position:absolute; inset:0;
    background:linear-gradient(90deg, transparent, rgba(255,255,250,.04), transparent);
    animation:cartSkelShimmer 1.6s ease-in-out infinite;
  }
  @keyframes cartSkelShimmer{
    0%{ transform:translateX(-100%); }
    100%{ transform:translateX(100%); }
  }

  /* ============ VETERAN DISCOUNT BANNER ============ */
  .vet-banner{
    margin-top:14px;
    padding:12px 14px;
    border:1px solid rgba(184,137,61,.3);
    background:linear-gradient(160deg, rgba(184,137,61,.08), rgba(184,137,61,.02));
    display:flex; align-items:center; gap:12px;
    font-size:12px;
    color:var(--ink-soft);
    line-height:1.5;
  }
  .vet-banner svg{ width:18px; height:18px; flex-shrink:0; color:var(--gold); }
  .vet-banner strong{ color:var(--ink); font-weight:600; }
  .vet-banner a{
    color:var(--gold-soft);
    text-decoration:underline;
    text-underline-offset:3px;
    font-weight:600;
    white-space:nowrap;
  }
  .vet-banner a:hover{ color:var(--gold); }

  /* ============ UNDO TOAST ============
     Shown briefly after a cart-item removal — gives the user a 5-second
     window to undo. NN/g: "undo > confirm" for reversible actions. */
  .undo-toast{
    position:fixed;
    left:50%; bottom:24px;
    transform:translateX(-50%) translateY(150%);
    background:#16161a;
    color:var(--ink);
    border:1px solid var(--line-strong);
    padding:14px 22px;
    display:flex; align-items:center; gap:18px;
    font-size:13px;
    font-family:'Inter',sans-serif;
    z-index:300;
    box-shadow:0 18px 40px -12px rgba(0,0,0,.7);
    transition:transform .25s ease;
    max-width:calc(100vw - 32px);
  }
  .undo-toast.show{ transform:translateX(-50%) translateY(0); }
  .undo-toast .undo-btn{
    background:transparent; border:none;
    color:var(--gold-soft);
    font-size:13px; font-weight:600;
    letter-spacing:.06em; text-transform:uppercase;
    cursor:pointer; padding:0;
    text-decoration:underline; text-underline-offset:3px;
  }
  .undo-toast .undo-btn:hover{ color:var(--gold); }
  @media (max-width:520px){
    .undo-toast{ left:14px; right:14px; bottom:14px; transform:translateY(150%); justify-content:space-between; }
    .undo-toast.show{ transform:translateY(0); }
  }
</style>
</head>
<body>
<a class="skip-link" href="#main">Skip to content</a>

<header class="nav">
  <a href="/" class="logo">TAGLINE</a>
  <div class="nav-links">
    <a href="/" class="nav-link hide-mobile">Continue shopping</a>
    <a href="/signin" class="nav-link signin-link">Sign in</a>
    <a href="/cart" class="cart-icon-btn" aria-label="Cart">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M5 7h14l-1.5 12a2 2 0 0 1-2 1.8h-7a2 2 0 0 1-2-1.8L5 7z"/><path d="M9 7V5a3 3 0 0 1 6 0v2"/></svg>
      <span class="cart-badge" data-cart-count style="display:none">0</span>
    </a>
  </div>
</header>

<main class="page-wide" id="main" tabindex="-1">
  <div class="section-marker"><span class="label">Cart</span></div>
  <h1 class="page-title">Your cart</h1>
  <div class="page-sub" id="cartSub">Review your items and proceed to checkout.</div>

  <div id="cartContent">
    <!-- Loading skeleton — replaced by render() once Tagline.PRODUCTS arrives -->
    <div class="cart-skeleton" aria-live="polite" aria-busy="true">
      <div class="cs-items">
        <div class="cs-item"><div class="cs-thumb"></div><div style="flex:1;display:flex;flex-direction:column;gap:8px"><div class="cs-line med"></div><div class="cs-line short"></div></div></div>
        <div class="cs-item"><div class="cs-thumb"></div><div style="flex:1;display:flex;flex-direction:column;gap:8px"><div class="cs-line med"></div><div class="cs-line short"></div></div></div>
      </div>
      <div class="cs-summary"></div>
      <span class="visually-hidden" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)">Loading your cart…</span>
    </div>
  </div>
</main>

<footer>
  <span>© 2026 TAGLINE</span>
  <div style="display:flex;gap:18px;flex-wrap:wrap"><a href="/contact">Contact</a><a href="/privacy">Privacy</a><a href="/terms">Terms</a></div>
</footer>

<script src="/tagline-app.js" defer></script>
<script>
(function(){
  // Product display data lives in tagline-app.js (window.Tagline.PRODUCTS) —
  // the single source of truth. We derive `initial` from name on the fly.
  function getProductData(id) {
    const p = window.Tagline?.PRODUCTS?.[id];
    if (!p) return null;
    return {
      name: p.name,
      color: p.color,
      price: p.price,
      initial: p.name.charAt(0).toUpperCase()
    };
  }

  function render() {
    if (!window.Tagline?.PRODUCTS) {
      // Catalog hasn't loaded yet — defer
      setTimeout(render, 50);
      return;
    }
    const items = window.Tagline.Cart.get();
    const container = document.getElementById('cartContent');
    const sub = document.getElementById('cartSub');

    if (items.length === 0) {
      sub.textContent = '';
      container.innerHTML = `
        <div class="empty">
          <svg style="width:42px;height:72px;margin:0 auto 24px;color:var(--gold);opacity:.6;display:block" viewBox="0 0 200 340" fill="currentColor" aria-hidden="true">
            <path d="M88 0 L112 0 L112 100 L180 100 L180 128 L112 128 L112 340 L88 340 L88 128 L20 128 L20 100 L88 100 Z"/>
          </svg>
          <h2>Your cart is empty.</h2>
          <p>Find something you love and bring it home.</p>
          <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:24px">
            <a href="/" class="btn btn-primary">Shop the collection</a>
            <a href="/customize" class="btn btn-ghost">Build your own</a>
          </div>
        </div>
      `;
      return;
    }

    // Filter out items whose product isn't in our catalog (deleted or unknown).
    // Avoids the "items in your cart" count diverging from what's rendered.
    const validItems = items.filter(i => getProductData(i.product_id));
    const totalQty = validItems.reduce((s,i)=>s+i.quantity,0);
    sub.textContent = `${totalQty} item${totalQty === 1 ? '' : 's'} in your cart`;

    let subtotal = 0;
    const esc = window.Tagline.escapeHtml;
    const itemsHtml = validItems.map((item, idx) => {
      const p = getProductData(item.product_id);
      const lineTotal = p.price * item.quantity;
      subtotal += lineTotal;
      const sizeLabel = item.size ? `<div class="color">Size: ${esc(item.size)}</div>` : '';
      const sizeAttr = item.size ? `data-size="${esc(item.size)}"` : '';
      return `
        <div class="cart-item" data-id="${esc(item.product_id)}" ${sizeAttr}>
          <div class="cart-item-thumb">${esc(p.initial)}</div>
          <div class="cart-item-info">
            <div class="name">${esc(p.name)}</div>
            <div class="color">${esc(p.color)}</div>
            ${sizeLabel}
            <div style="display:flex;align-items:center;flex-wrap:wrap">
              <div class="qty-control">
                <button type="button" class="qty-btn" data-action="decrease" aria-label="Decrease">−</button>
                <div class="qty-display">${item.quantity}</div>
                <button type="button" class="qty-btn" data-action="increase" aria-label="Increase">+</button>
              </div>
              <button type="button" class="remove-btn" data-action="remove">Remove</button>
            </div>
          </div>
          <div class="cart-item-price">$${lineTotal.toFixed(2)}</div>
        </div>
      `;
    }).join('');

    const shipping = subtotal >= 150 ? 0 : 8;
    const total = subtotal + shipping;
    const toFreeShip = Math.max(0, 150 - subtotal);

    container.innerHTML = `
      <div class="cart-layout">
        <div class="cart-items">${itemsHtml}</div>
        <aside class="cart-summary">
          <div class="summary-row"><span class="label">Subtotal</span><span class="value">$${subtotal.toFixed(2)}</span></div>
          <div class="summary-row"><span class="label">Shipping</span><span class="value">${shipping === 0 ? 'Free' : '$' + shipping.toFixed(2)}</span></div>
          ${toFreeShip > 0 ? `<div class="summary-shipping-note">Add $${toFreeShip.toFixed(2)} more for free shipping.</div>` : ''}
          <div class="summary-row total"><span class="label">Total</span><span class="value">$${total.toFixed(2)}</span></div>
          <button type="button" class="btn btn-primary btn-block" id="checkoutBtn" style="margin-top:24px">
            Checkout
          </button>
          <button type="button" class="btn btn-ghost btn-block" id="checkoutCryptoBtn" hidden style="margin-top:8px;font-size:12px">
            Pay with crypto
          </button>
          <div class="vet-banner" id="vetBanner" hidden>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true">
              <path d="M12 2 L4 5 V11 C4 16 7.5 20.5 12 22 C16.5 20.5 20 16 20 11 V5 Z"/>
              <path d="M9 12 L11 14 L15 10"/>
            </svg>
            <span id="vetBannerText">
              <strong>Veterans &amp; military:</strong> get 10% off.
              <a id="vetVerifyLink" href="#" target="_blank" rel="noopener noreferrer">Verify with GovX →</a>
            </span>
          </div>
          <p style="font-size:11px;color:var(--muted);margin-top:14px;text-align:center;line-height:1.6">
            Secure checkout via Stripe.<br/>
            Free returns within 30 days · <a href="/help" style="color:var(--gold-soft);text-decoration:underline;text-underline-offset:2px">Return policy</a>
          </p>
          <div style="display:flex;gap:6px;justify-content:center;margin-top:14px;align-items:center;flex-wrap:wrap;opacity:.6">
            <svg viewBox="0 0 32 22" fill="none" width="32" height="22" aria-label="Visa"><rect width="32" height="22" rx="3" fill="#fff"/><text x="16" y="15" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" font-weight="800" fill="#1A1F71">VISA</text></svg>
            <svg viewBox="0 0 32 22" fill="none" width="32" height="22" aria-label="Mastercard"><rect width="32" height="22" rx="3" fill="#fff"/><circle cx="13" cy="11" r="5" fill="#EB001B"/><circle cx="19" cy="11" r="5" fill="#F79E1B"/></svg>
            <svg viewBox="0 0 32 22" fill="none" width="32" height="22" aria-label="American Express"><rect width="32" height="22" rx="3" fill="#006FCF"/><text x="16" y="15" text-anchor="middle" font-family="Inter,sans-serif" font-size="6" font-weight="700" fill="#fff">AMEX</text></svg>
            <svg viewBox="0 0 32 22" fill="none" width="32" height="22" aria-label="Discover"><rect width="32" height="22" rx="3" fill="#fff"/><text x="16" y="15" text-anchor="middle" font-family="Inter,sans-serif" font-size="5.5" font-weight="700" fill="#FF6000">DISCOVER</text></svg>
            <svg viewBox="0 0 32 22" fill="none" width="32" height="22" aria-label="Apple Pay"><rect width="32" height="22" rx="3" fill="#000"/><text x="16" y="14.5" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="6" font-weight="600" fill="#fff">Pay</text><path d="M11 9.5c-.4 0-.7.2-.9.5" stroke="#fff" stroke-width=".5" fill="none"/></svg>
            <svg viewBox="0 0 32 22" fill="none" width="32" height="22" aria-label="Google Pay"><rect width="32" height="22" rx="3" fill="#fff"/><text x="16" y="14.5" text-anchor="middle" font-family="Inter,sans-serif" font-size="6" font-weight="600" fill="#5F6368">G&#160;Pay</text></svg>
            <svg viewBox="0 0 32 22" fill="none" width="32" height="22" aria-label="PayPal"><rect width="32" height="22" rx="3" fill="#fff"/><text x="16" y="14.5" text-anchor="middle" font-family="Inter,sans-serif" font-size="6" font-weight="700" fill="#003087">PayPal</text></svg>
          </div>
        </aside>
      </div>
    `;
    // Note: click handler is attached once in init via event delegation,
    // so we don't re-attach here (which used to leak handlers per render
    // and cause multi-step quantity updates).
  }

  function handleClick(e) {
    const action = e.target.dataset.action;
    if (!action) return;
    const item = e.target.closest('.cart-item');
    if (!item) return;
    const id = item.dataset.id;
    const size = item.dataset.size || undefined;
    const cart = window.Tagline.Cart;
    const current = cart.get().find(i =>
      i.product_id === id && (i.size || null) === (size || null)
    );
    if (!current) return;

    if (action === 'increase') cart.updateQuantity(id, current.quantity + 1, size);
    if (action === 'decrease') cart.updateQuantity(id, current.quantity - 1, size);
    if (action === 'remove') {
      // Capture the item before removal so we can restore it on undo
      const removed = { product_id: id, quantity: current.quantity, size: size };
      cart.remove(id, size);
      showUndoToast(removed);
    }
    render();
  }

  // ============ UNDO TOAST ============
  let undoTimer = null;
  let undoToastEl = null;

  function showUndoToast(removedItem) {
    // Dismiss any in-flight toast immediately
    if (undoToastEl) {
      clearTimeout(undoTimer);
      undoToastEl.remove();
      undoToastEl = null;
    }

    const toast = document.createElement('div');
    toast.className = 'undo-toast';
    toast.setAttribute('role', 'status');
    toast.setAttribute('aria-live', 'polite');

    const span = document.createElement('span');
    span.textContent = 'Item removed.';
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'undo-btn';
    btn.textContent = 'Undo';
    toast.appendChild(span);
    toast.appendChild(btn);
    document.body.appendChild(toast);
    undoToastEl = toast;
    requestAnimationFrame(() => toast.classList.add('show'));

    btn.addEventListener('click', () => {
      // Restore the removed item to the cart
      window.Tagline.Cart.add(
        removedItem.product_id,
        removedItem.quantity,
        removedItem.size ? { size: removedItem.size } : {}
      );
      dismissUndoToast();
      render();
    });

    undoTimer = setTimeout(dismissUndoToast, 5000);
  }

  function dismissUndoToast() {
    clearTimeout(undoTimer);
    if (!undoToastEl) return;
    undoToastEl.classList.remove('show');
    const t = undoToastEl;
    setTimeout(() => { t.remove(); }, 280);
    undoToastEl = null;
  }

  async function handleCheckout() {
    const btn = document.getElementById('checkoutBtn');
    btn.disabled = true;
    btn.textContent = 'Loading checkout…';

    const items = window.Tagline.Cart.get();
    const result = await window.Tagline.API.request('/api/checkout', {
      method: 'POST',
      body: { items },
      auth: true
    });

    if (result.ok && result.url) {
      window.location.href = result.url;
    } else if (result.preview) {
      // Preview mode - show friendly message
      btn.textContent = 'Checkout coming soon';
      btn.style.background = 'transparent';
      btn.style.color = 'var(--gold-soft)';
      btn.style.borderColor = 'rgba(184,137,61,.4)';
      const note = document.createElement('p');
      note.textContent = 'This is a preview. Checkout activates at launch.';
      note.style.cssText = 'font-size:11px;color:var(--muted);margin-top:14px;text-align:center';
      const existing = btn.parentElement.querySelector('.preview-note');
      if (!existing) {
        note.className = 'preview-note';
        btn.parentElement.appendChild(note);
      }
    } else {
      btn.disabled = false;
      btn.textContent = 'Checkout';
      alert(result.error || 'Could not start checkout. Please try again.');
    }
  }

  // Single delegated click handler for qty +/-/remove and checkout —
  // attached once on the static container, not re-attached on each render.
  function init() {
    const container = document.getElementById('cartContent');
    container.addEventListener('click', (e) => {
      if (e.target.id === 'checkoutBtn') {
        handleCheckout();
        return;
      }
      if (e.target.id === 'checkoutCryptoBtn') {
        handleCryptoCheckout();
        return;
      }
      handleClick(e);
    });
    render();
  }

  // Reveal the crypto button only if NowPayments is configured server-side.
  // We probe with a HEAD-style POST that's expected to reject (cart is the
  // client cart, but the endpoint will return either:
  //   503 + not_configured:true  → crypto unavailable, hide button
  //   400 (validation)           → endpoint exists, button stays visible
  // Cached per-session so we don't probe on every render.
  let cryptoProbeDone = false;
  async function probeCryptoAvailability() {
    if (cryptoProbeDone) return;
    cryptoProbeDone = true;
    try {
      const cached = sessionStorage.getItem('tagline_crypto_avail');
      if (cached === 'on') {
        showCryptoBtn();
        return;
      }
      if (cached === 'off') return;
    } catch {}

    try {
      const res = await fetch('/api/checkout-crypto', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ items: [] })
      });
      const data = await res.json().catch(() => ({}));
      if (res.status === 503 && data.not_configured) {
        try { sessionStorage.setItem('tagline_crypto_avail', 'off'); } catch {}
        return;
      }
      // Any other response (400 = empty cart validation, etc.) means the
      // endpoint exists and is configured — show the button.
      try { sessionStorage.setItem('tagline_crypto_avail', 'on'); } catch {}
      showCryptoBtn();
    } catch {
      // Network failure — leave hidden, retry next session
    }
  }
  function showCryptoBtn() {
    const btn = document.getElementById('checkoutCryptoBtn');
    if (btn) btn.hidden = false;
  }

  async function handleCryptoCheckout() {
    const btn = document.getElementById('checkoutCryptoBtn');
    btn.disabled = true;
    btn.textContent = 'Loading…';

    // Crypto path needs an email since NowPayments doesn't collect one
    let email = window.Tagline?.Auth?.getUser()?.email || '';
    if (!email) {
      email = prompt('Enter your email for order updates:') || '';
      email = email.trim();
      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        btn.disabled = false;
        btn.textContent = 'Pay with crypto';
        return;
      }
    }

    const items = window.Tagline.Cart.get();
    const result = await window.Tagline.API.request('/api/checkout-crypto', {
      method: 'POST',
      body: { items, email },
      auth: true
    });

    if (result.ok && result.url) {
      window.location.href = result.url;
    } else {
      btn.disabled = false;
      btn.textContent = 'Pay with crypto';
      window.Tagline.Modal.alert({
        title: 'Crypto checkout',
        message: result.error || 'Could not start crypto checkout. Please try again.'
      });
    }
  }

  // ============ VETERAN DISCOUNT BANNER ============
  // Reveal only if /api/config returns veteranVerifyUrl. Caches per-session.
  async function probeVeteranDiscount() {
    let cfg = null;
    try {
      const cached = sessionStorage.getItem('tagline_config');
      if (cached) cfg = JSON.parse(cached);
    } catch {}
    if (!cfg) {
      try {
        const res = await fetch('/api/config');
        if (!res.ok) return;
        cfg = await res.json();
        try { sessionStorage.setItem('tagline_config', JSON.stringify(cfg)); } catch {}
      } catch { return; }
    }
    if (!cfg || !cfg.veteranVerifyUrl) return;

    const banner = document.getElementById('vetBanner');
    const link = document.getElementById('vetVerifyLink');
    const text = document.getElementById('vetBannerText');
    if (!banner || !link || !text) return;

    // Validate the URL is http(s) before injecting (defense vs malformed env var)
    let safeUrl;
    try {
      const u = new URL(cfg.veteranVerifyUrl);
      if (u.protocol !== 'https:' && u.protocol !== 'http:') return;
      safeUrl = u.toString();
    } catch { return; }

    link.href = safeUrl;
    const pct = Number.isInteger(cfg.veteranDiscountPercent) ? cfg.veteranDiscountPercent : 10;
    text.firstChild.textContent = ''; // clear, then rebuild safely
    text.innerHTML = `<strong>Veterans &amp; military:</strong> get ${pct}% off. `;
    text.appendChild(link);
    banner.hidden = false;
  }

  // Run the probes once cart-app is ready
  if (window.Tagline) {
    probeCryptoAvailability();
    probeVeteranDiscount();
  } else {
    document.addEventListener('DOMContentLoaded', () => {
      probeCryptoAvailability();
      probeVeteranDiscount();
    });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
  window.addEventListener('cart:updated', render);
})();
</script>
