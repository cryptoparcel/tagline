<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#08080a"/>
      <stop offset="100%" stop-color="#16110b"/>
    </linearGradient>
    <linearGradient id="cross" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fafaf7" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#b8893d"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#b8893d" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#b8893d" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="600" cy="315" r="320" fill="url(#glow)"/>

  <!-- Cross logo -->
  <path d="M580 130 L620 130 L620 290 L780 290 L780 330 L620 330 L620 540 L580 540 L580 330 L420 330 L420 290 L580 290 Z" fill="url(#cross)"/>

  <!-- Brand wordmark -->
  <text x="600" y="100" text-anchor="middle"
        font-family="'Space Grotesk','Helvetica Neue',Arial,sans-serif"
        font-size="44" font-weight="600" letter-spacing="14"
        fill="#fafaf7">TAGLINE</text>

  <!-- Tagline (the actual one) -->
  <text x="600" y="585" text-anchor="middle"
        font-family="'Inter','Helvetica Neue',Arial,sans-serif"
        font-size="22" font-weight="400" letter-spacing="6"
        fill="#c8c8c0">CUSTOM ATHLETIC WEAR</text>

  <!-- Top-left and bottom-right accent marks -->
  <line x1="60" y1="60" x2="120" y2="60" stroke="#b8893d" stroke-width="2"/>
  <line x1="1080" y1="570" x2="1140" y2="570" stroke="#b8893d" stroke-width="2"/>
</svg>
